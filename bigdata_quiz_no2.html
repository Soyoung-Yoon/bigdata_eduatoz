<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빅데이터 분석기사 2회 기출 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: #0b0d14; color: #e4eaf8; min-height: 100vh; }

.overlay-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: #0b0d14;
  display: flex; align-items: center; justify-content: center;
}
.overlay-screen.hidden { display: none; }

.login-box {
  background: #151a2e; border: 1px solid #243050; border-radius: 20px;
  padding: 2.5rem 2rem; width: 100%; max-width: 400px;
  text-align: center; position: relative;
}
.login-box::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  border-radius:20px 20px 0 0;
  background:linear-gradient(90deg,#f5c842,#2ee8c4,#b48bff,#ff4f72);
}
.login-icon { font-size: 2.8rem; margin-bottom: 0.8rem; }
.login-title {
  font-size: 1rem; font-weight: 900; margin-bottom: 0.3rem;
  background: linear-gradient(120deg, #f5c842, #2ee8c4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.login-sub { font-size: 0.75rem; color: #6b7fa0; margin-bottom: 1.2rem; line-height: 1.6; }
.login-label { font-size: 0.7rem; color: #6b7fa0; text-align: left; margin-bottom: 0.3rem; margin-top: 0.8rem; }
.login-input {
  width: 100%; padding: 0.72rem 1rem;
  background: #0f1422; border: 1px solid #243050; border-radius: 10px;
  color: #e4eaf8; font-size: 0.88rem; font-family: 'Noto Sans KR', sans-serif;
  outline: none; transition: border-color 0.2s;
}
.login-input:focus { border-color: #2ee8c4; }
.login-input.shake { border-color: #ff4f72; animation: shake 0.3s ease; }
.login-btn {
  width: 100%; margin-top: 1rem; padding: 0.75rem;
  background: linear-gradient(135deg, #2ee8c4, #b48bff);
  border: none; border-radius: 10px;
  color: #0b0d14; font-size: 0.88rem; font-weight: 900;
  font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: opacity 0.2s;
}
.login-btn:hover { opacity: 0.85; }
.login-error { font-size: 0.74rem; color: #ff4f72; margin-top: 0.5rem; min-height: 1.1rem; }

.saved-ids { margin-top: 1rem; border-top: 1px solid #243050; padding-top: 0.85rem; text-align: left; }
.saved-ids-title { font-size: 0.68rem; color: #6b7fa0; margin-bottom: 0.5rem; }
.saved-id-list { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.saved-id-chip {
  padding: 0.25rem 0.7rem; border-radius: 20px;
  background: rgba(46,232,196,0.1); border: 1px solid rgba(46,232,196,0.3);
  color: #2ee8c4; font-size: 0.72rem; cursor: pointer; transition: background 0.2s;
}
.saved-id-chip:hover { background: rgba(46,232,196,0.2); }

@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

header {
  background: linear-gradient(135deg, #111828 0%, #1a2040 100%);
  border-bottom: 1px solid #243050; padding: 0.65rem 1.4rem;
  position: relative; display: flex; align-items: center; justify-content: space-between;
}
header::before {
  content:''; position:absolute; top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#f5c842,#2ee8c4,#b48bff,#ff4f72);
}
.header-left h1 {
  font-size:0.95rem;font-weight:900;
  background:linear-gradient(120deg,#f5c842,#2ee8c4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header-left p { font-size:0.68rem; color:#6b7fa0; margin-top:0.1rem; }
.header-right { display:flex; align-items:center; gap:0.5rem; flex-shrink:0; }
.user-badge {
  font-size:0.72rem; font-weight:700; color:#2ee8c4;
  background:rgba(46,232,196,0.1); border:1px solid rgba(46,232,196,0.3);
  border-radius:20px; padding:0.22rem 0.7rem; white-space:nowrap;
}
.logout-btn {
  font-size:0.68rem; color:#6b7fa0; background:none;
  border:1px solid #243050; border-radius:10px;
  padding:0.22rem 0.6rem; cursor:pointer;
  font-family:'Noto Sans KR',sans-serif; transition:all 0.2s;
}
.logout-btn:hover { color:#e4eaf8; border-color:#6b7fa0; }

.tab-bar { background:#131827; border-bottom:1px solid #243050; display:flex; overflow-x:auto; }
.tab-btn {
  flex:1; min-width:90px; padding:0.62rem 0.35rem;
  background:none; border:none; border-bottom:3px solid transparent;
  color:#6b7fa0; font-size:0.72rem; font-weight:700;
  font-family:'Noto Sans KR',sans-serif;
  cursor:pointer; transition:all 0.2s; white-space:nowrap;
  display:flex; flex-direction:column; align-items:center; gap:0.18rem;
}
.tab-btn:hover { color:#e4eaf8; background:rgba(255,255,255,0.03); }
.tab-btn.active.t0 { border-color:#f5c842; color:#f5c842; }
.tab-btn.active.t1 { border-color:#2ee8c4; color:#2ee8c4; }
.tab-btn.active.t2 { border-color:#b48bff; color:#b48bff; }
.tab-btn.active.t3 { border-color:#ff4f72; color:#ff4f72; }
.tab-btn.active.t4 { border-color:#f97316; color:#f97316; }
.tab-score {
  font-size:0.6rem; background:rgba(255,255,255,0.07);
  border-radius:10px; padding:0.07rem 0.42rem;
}

.content { max-width:860px; margin:0 auto; padding:1.4rem 1rem 3rem; }
.subject-panel { display:none; }
.subject-panel.active { display:block; }

.subject-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:1rem; flex-wrap:wrap; gap:0.5rem;
}
.subject-title { font-size:0.92rem; font-weight:900; }
.score-badge {
  font-size:0.76rem; font-weight:700; padding:0.25rem 0.8rem;
  border-radius:20px; background:rgba(255,255,255,0.06); border:1px solid #243050;
}
.reset-btn {
  font-size:0.68rem; padding:0.25rem 0.7rem; border-radius:12px;
  background:rgba(255,255,255,0.05); border:1px solid #243050;
  color:#6b7fa0; cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:all 0.2s;
}
.reset-btn:hover { color:#e4eaf8; border-color:#6b7fa0; }

.q-card {
  background:#151a2e; border:1px solid #243050;
  border-radius:14px; padding:1.15rem; margin-bottom:0.9rem; transition:border-color 0.3s;
}
.q-card.correct { border-color:#2ee8c4; }
.q-card.wrong { border-color:#ff4f72; }

.q-num { font-size:0.62rem; font-weight:700; color:#6b7fa0; margin-bottom:0.32rem; }
.q-origin-tag {
  display:inline-block; font-size:0.58rem; font-weight:700;
  padding:0.08rem 0.42rem; border-radius:8px; margin-left:0.35rem;
  vertical-align:middle;
}
.q-text { font-size:0.83rem; font-weight:700; line-height:1.6; margin-bottom:0.85rem; }

.options { display:flex; flex-direction:column; gap:0.42rem; }
.opt-btn {
  display:flex; align-items:flex-start; gap:0.55rem;
  padding:0.6rem 0.85rem; border-radius:10px;
  background:rgba(255,255,255,0.03); border:1px solid #243050;
  color:#c4cfe8; font-size:0.78rem; font-weight:500;
  font-family:'Noto Sans KR',sans-serif;
  cursor:pointer; text-align:left; line-height:1.5; transition:all 0.2s;
}
.opt-btn:hover:not(:disabled) { background:rgba(255,255,255,0.07); border-color:#6b7fa0; color:#fff; }
.opt-btn:disabled { cursor:default; }
.opt-num {
  min-width:19px; height:19px; border-radius:50%;
  background:#1e2540; border:1px solid #3a4565;
  display:flex; align-items:center; justify-content:center;
  font-size:0.65rem; font-weight:700; flex-shrink:0; margin-top:2px;
}
.opt-btn.selected-correct { background:rgba(46,232,196,0.12); border-color:#2ee8c4; color:#2ee8c4; }
.opt-btn.selected-correct .opt-num { background:rgba(46,232,196,0.2); border-color:#2ee8c4; color:#2ee8c4; }
.opt-btn.selected-wrong { background:rgba(255,79,114,0.1); border-color:#ff4f72; color:#ff4f72; }
.opt-btn.selected-wrong .opt-num { background:rgba(255,79,114,0.2); border-color:#ff4f72; color:#ff4f72; }
.opt-btn.show-correct { background:rgba(46,232,196,0.06); border-color:rgba(46,232,196,0.4); color:#2ee8c4; }
.opt-btn.show-correct .opt-num { background:rgba(46,232,196,0.15); border-color:#2ee8c4; color:#2ee8c4; }

.result-row { display:flex; align-items:center; gap:0.5rem; margin-top:0.65rem; font-size:0.75rem; font-weight:700; }
.result-ok { color:#2ee8c4; }
.result-ng { color:#ff4f72; }

.explanation {
  margin-top:0.7rem; padding:0.72rem 0.95rem;
  background:rgba(255,255,255,0.03); border-radius:8px;
  border-left:3px solid #6b7fa0;
  font-size:0.73rem; color:#9bacc8; line-height:1.7; white-space:pre-line;
}
.explanation.correct-exp { border-left-color:#2ee8c4; }
.explanation.wrong-exp { border-left-color:#ff4f72; }

.progress-bar-wrap { background:#1e2540; border-radius:6px; height:5px; margin-bottom:1rem; overflow:hidden; }
.progress-bar { height:100%; border-radius:6px; background:linear-gradient(90deg,#2ee8c4,#b48bff); transition:width 0.5s ease; }

.wrong-empty { text-align:center; padding:4rem 1rem; color:#6b7fa0; font-size:0.84rem; line-height:2.2; }
.wrong-empty .big { font-size:3rem; margin-bottom:0.4rem; }

#toast {
  position:fixed; bottom:1.4rem; left:50%; transform:translateX(-50%);
  background:#0d1a0d; border:1px solid #2ee8c4; color:#2ee8c4;
  font-size:0.74rem; font-weight:700; padding:0.5rem 1.1rem;
  border-radius:20px; opacity:0; pointer-events:none;
  transition:opacity 0.3s; z-index:999; white-space:nowrap;
}
#toast.show { opacity:1; }
</style>
</head>
<body>

<!-- 비밀번호 -->
<div class="overlay-screen" id="pw-screen">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <div class="login-title">빅데이터 분석기사 퀴즈</div>
    <div class="login-sub">에듀아토즈 학습 포털입니다.<br>비밀번호를 입력하세요.</div>
    <div class="login-label">비밀번호</div>
    <input class="login-input" id="pw-input" type="password" placeholder="비밀번호 입력">

<!-- ID 입력 -->
<div class="overlay-screen hidden" id="id-screen">
  <div class="login-box">
    <div class="login-icon">👤</div>
    <div class="login-title">학습자 ID 입력</div>
    <div class="login-sub">ID를 입력하면 풀이 기록이 저장됩니다.<br>다음 접속 시 이어서 풀 수 있어요.</div>
    <div class="login-label">학습자 ID (이름, 학번 등)</div>
    <input class="login-input" id="id-input" type="text" placeholder="예: hong_gildong">
    <button class="login-btn" onclick="loginUser()">시작하기</button>
    <div class="login-error" id="id-error"></div>
    <div class="saved-ids" id="saved-ids-wrap" style="display:none">
      <div class="saved-ids-title">📌 최근 사용한 ID (클릭하면 바로 입장)</div>
      <div class="saved-id-list" id="saved-id-list"></div>
    </div>
  </div>
</div>

<!-- 메인 -->
<header>
  <div class="header-left">
    <h1>📚 빅데이터 분석기사 — 2회 기출 퀴즈</h1>
    <p>보기를 클릭하면 즉시 채점 · 자동 저장됩니다</p>
  </div>
  <div class="header-right">
    <span class="user-badge" id="user-badge">-</span>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div>
</header>

<div class="tab-bar" id="tabBar"></div>
<div class="content" id="mainContent"></div>
<div id="toast">💾 저장됨</div>

<script>
// ── Storage wrapper (localStorage 기반) ──
const Store = {
  async get(key) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch { return null; }
  },
  async set(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  },
  async list(prefix) {
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(prefix)) keys.push(k);
      }
      return keys;
    } catch { return []; }
  }
};

// ── Data ──
const SUBJECTS = [
  { label:'1과목', name:'빅데이터 기획',   emoji:'📘', cc:'t0' },
  { label:'2과목', name:'빅데이터 탐색',   emoji:'📐', cc:'t1' },
  { label:'3과목', name:'빅데이터 모델링', emoji:'🧠', cc:'t2' },
  { label:'4과목', name:'평가·활용',       emoji:'📊', cc:'t3' },
  { label:'오답노트', name:'틀린 문제 다시 풀기', emoji:'❌', cc:'t4' },
];

const Q = [
  // 1과목 (s:0)
  {s:0,q:'개인정보에 대한 동의 없이 수집 및 이용이 가능한 경우가 아닌 것은?',o:['사전 동의를 받을 수 없는 경우로서 명백히 정보주체 또는 제3자의 급박한 생명, 신체, 재산의 이익을 위하여 필요하다고 인정되는 경우','입사 지원자에 대해 회사가 범죄 이력 등을 조회하는 경우','진료기록부 작성을 위한 주소, 성명, 주민등록번호 등을 기입하는 경우','요금 부과를 위해 회사가 사용자의 정보를 조회하는 경우'],a:1,e:'입사 지원자에 대해 회사가 범죄 이력을 조회하는 것은 정보주체의 권리보다 명백히 우선하는 경우가 아님'},
  {s:0,q:'개인정보수집 시 사용자에게 고지하지 않아도 되는 사항은?',o:['개인정보수집에 대한 동의를 거부할 수 있는 권리가 있다는 사실','개인정보의 수집·이용 목적','개인정보 파기 사유','개인정보의 보유 및 이용 기간'],a:2,e:'개인정보 수집 시 필수 고지 내용: 동의 거부 권리 및 불이익, 수집·이용 목적, 수집 항목, 보유 및 이용 기간\n파기 사유는 필수 고지 항목이 아님'},
  {s:0,q:'2018년 5월 EU에서 시행된 법령으로, 정보주체의 권리와 기업의 책임성 강화 등을 주요 내용으로 하고 있는 개인정보보호법은 무엇인가?',o:['GDPR','GDP','PII','PDA'],a:0,e:'GDPR(General Data Protection Regulation): 2018년 5월 EU에서 시행된 개인정보보호법\nPII: 개인식별정보, PDA: 개인용 디지털 단말기, GDP: 국내총생산'},
  {s:0,q:'개인정보 비식별화의 처리 방법으로 올바르지 않은 것은?',o:['가명 처리','데이터 범주화','특이화','섭동'],a:2,e:'식별자 제거를 통한 비식별화 기술: 가명처리, 총계처리, 데이터 값 삭제, 데이터 범주화, 데이터 마스킹\n"특이화"는 비식별화 기술이 아님'},
  {s:0,q:'비식별화 조치에 대한 익명성 검증 방법에 대한 설명으로 올바르지 않은 것은?',o:['k-익명성: 동일한 값을 가진 레코드가 k개 이상이 되도록 하는 기법','l-다양성: 민감정보의 다양성을 낮춰 동질성의 문제를 해결하고, 배경지식을 통한 추론 가능성을 낮추는 방법','t-근접성: 준식별자의 특정 조합이 가지는 민감정보의 분포와 전체 데이터 집합의 민감정보 분포 차이를 t 이하로 만드는 방법','m-유일성: 원본 데이터와 동일한 속성값의 조합이 비식별 결과 데이터에 최소 m개 존재해야 한다'],a:1,e:'l-다양성: 민감정보의 다양성을 높여 k-익명성의 단점인 동질성 공격, 배경지식 기반 공격을 방지하기 위한 기법\n(낮추는 것이 아니라 높이는 것)'},
  {s:0,q:'분석 대상과 분석 방법을 모두 알고 있을 때 적용할 수 있는 문제 해결 방법은?',o:['최적화','솔루션','통합','발견'],a:0,e:'Optimization(최적화): 분석 대상 및 분석 방법을 이해하고 현 문제를 최적화의 형태로 수행\nSolution: 분석 방법을 모를 때, Insight: 대상 불분명·방법 앎, Discovery: 둘 다 모를 때'},
  {s:0,q:'진단 분석의 목적으로 올바른 것은?',o:['앞으로 무엇이 일어날 것인가? 언제 일어날 것인가?','현재 무엇이 일어났는가? 왜 일어났는가?','앞으로 무엇이 일어날 것인가? 왜 일어나는가?','현재 무엇이 일어났는가? 언제 재발할 것인가?'],a:1,e:'진단분석(why): 묘사 단계에서 찾아낸 분석 내용의 원인을 데이터 기반으로 이해·확인하는 과정'},
  {s:0,q:'상향식 접근 방식의 절차를 순서대로 나열한 것을 고르시오.',o:['분석요건 정의 → 분석요건 식별 → 프로세스 흐름 분석 → 프로세스 분류','프로세스 분류 → 프로세스 흐름 분석 → 분석요건 식별 → 분석요건 정의','분석요건 식별 → 프로세스 흐름 분석 → 분석요건 정의 → 프로세스 분류','프로세스 분류 → 분석요건 정의 → 프로세스 흐름 분석 → 분석요건 식별'],a:1,e:'상향식 접근 방식 절차:\n프로세스 분류 → 프로세스 흐름 분석 → 분석요건 식별 → 분석요건 정의'},
  {s:0,q:'데이터 분석 성숙도 모델에 해당하는 단계가 아닌 것은?',o:['도입','활용','확산','인프라'],a:3,e:'분석 성숙도 모델의 4단계: 도입 → 활용 → 확산 → 최적화\n"인프라"는 성숙도 단계가 아님'},
  {s:0,q:'데이터 표준 및 정책에 따라 데이터를 생성·변경하고 전사 차원의 데이터 관리 체계를 구축하는 것은?',o:['데이터 레이크','데이터 거버넌스','데이터 웨어하우스','IT 업무 혁신'],a:1,e:'데이터 거버넌스: 데이터의 품질보장, 프라이버시 보호, 데이터 수명 관리 등 전사 차원의 데이터 관리 체계를 확립하는 것'},
  {s:0,q:'다음 중 빅데이터 분석 방법론의 분석 절차 순서로 올바른 것은?',o:['분석 기획 → 데이터 준비 → 데이터 분석 → 평가 및 전개 → 시스템 구현','분석 기획 → 데이터 준비 → 데이터 분석 → 시스템 구현 → 평가 및 전개','데이터 준비 → 분석 기획 → 데이터 분석 → 시스템 구현 → 평가 및 전개','데이터 준비 → 분석 기획 → 데이터 분석 → 평가 및 전개 → 시스템 구현'],a:1,e:'빅데이터 분석 방법론의 분석 절차 순서:\n분석 기획 → 데이터 준비 → 데이터 분석 → 시스템 구현 → 평가 및 전개'},
  {s:0,q:'탐색적 데이터 분석에 대한 설명 중 틀린 것은?',o:['주어진 데이터만 가지고도 충분한 정보를 찾을 수 있도록 개발한 방법이다','탐색적 자료분석을 통해 분포 비교, 결측치/이상치 확인 등을 할 수 있다','분석 결과물로는 유의확률과 신뢰구간 등이 있다','데이터에서 특이한 점이나 의미 있는 사실을 도출하는 과정이다'],a:2,e:'탐색적 데이터 분석의 결과물: 데이터 탐색 보고서, 데이터 시각화 보고서\n유의확률과 신뢰구간은 가설검정의 결과물'},
  {s:0,q:'빅데이터 분석 프로세스에서 데이터를 이용한 분류, 예측, 군집 등의 기능을 수행할 수 있도록 하는 것을 만드는 과정을 무엇이라 하는가?',o:['모델링','탐색적 데이터 분석','차원 축소','시각화'],a:0,e:'모델링: 데이터를 이용한 분류, 예측 군집 등의 기능을 수행할 수 있도록 하는 것을 만드는 과정'},
  {s:0,q:'다음 중 데이터 유형에 따른 수집 방법으로 올바르지 않은 것은?',o:['DBMS : Crawling','웹 : FTP','센서데이터 : Open API','동영상 : Streaming'],a:0,e:'DBMS 수집 방법: Sqoop(Connector를 사용하여 RDBMS와 HDFS 사이의 데이터 전송)\nCrawling은 웹 페이지에서 데이터를 수집하는 방법'},
  {s:0,q:'비정형 데이터 처리법으로 옳지 않은 것은?',o:['음성: y=f(x)의 수식으로 변환하여 시간에 따른 값을 저장한다','텍스트: 텍스트를 토큰화 한다','웹 문서: 크롤러를 통해 웹 구조를 가져와 필요한 정보를 저장한다','사진: 픽셀별 RGB 값을 저장한다'],a:0,e:'음성: 푸리에 변환을 통해 각 진동수 성분을 스펙토그램(Spectogram)으로 저장할 수 있음'},
  {s:0,q:'다음에서 설명하는 데이터 품질 평가 요소는? (정확한 데이터 접근을 위해 오류가 입력되지 않게 하고, 정의된 기준에 맞게 유효한 값의 범위와 형식으로 되어 있는지 측정하는 지표)',o:['완전성','유용성','적시성','정확성'],a:3,e:'정확성: 정확한 데이터 접근을 위해 오류가 입력되지 않게 하고 정의된 기준에 맞게 유효한 값의 범위와 형식으로 되어 있는지 측정'},
  {s:0,q:'정형 데이터 품질에 대한 설명으로 적절한 것은?',o:['메타데이터 수집 및 분석은 데이터를 위한 데이터로 프로파일링을 수행하기 이전에 수행되며, 데이터 관리 문서로부터 수집하여 구조 및 유형을 파악한다','사전 정의 방식은 진단하려는 대상, 진단 목적 등을 고려해 측정 기준 중요도를 선정하여 활용하는 방식이다','임의적 방식은 사전에 정의된 바가 없어 통계적 분석 방법(AHP 등)을 통해 산출하는 방법이다','업무규칙 도출은 업무규칙 도출, 데이터 현상 분석, 데이터 품질 측정 순으로 진행된다'],a:0,e:'메타데이터 수집 및 분석은 프로파일링 수행 이전에 수행\n사전 정의 방식·임의적 방식은 비정형 데이터 품질 진단 방법\n업무규칙 도출 순서: 데이터 현상 분석 → 업무규칙 도출 → 데이터 품질 측정'},
  {s:0,q:'탐색적 데이터 분석에 대한 설명으로 올바르지 않은 것은?',o:['수집한 데이터를 다양한 관점에서 관찰하고 이해하는 과정이다','분석 모형에 대한 후보 모형을 선정하여 분석 효율성을 높이는 과정이다','분석에 앞서 그래프나 통계적인 방법으로 자료를 직관적으로 바라보는 과정이다','데이터를 이해하고 의미 있는 관계를 찾아내는 과정이다'],a:1,e:'분석 모형 선정은 "분석 모형 설계 과정"에 포함된 내용이지, 탐색적 데이터 분석의 목적이 아님'},
  // 2과목 (s:1)
  {s:1,q:'대푯값에 대한 설명과 특징으로 옳지 않은 것은?',o:['중앙값은 자료를 크기 순으로 나열할 때 가운데 위치한 값이며, 이상값에 민감하다','분산은 평균으로부터 얼마나 떨어져 있는지를 나타내는 값이며, 표본 분산은 자유도로 나눠서 계산한다','IQR은 제3사분위수와 제1사분위수의 차이값이며, 상자 그림을 통해 직관적으로 파악할 수 있다','왜도는 데이터 분포의 기울어진 정도를 설명하며, 왜도가 0보다 크면 최빈값 < 중앙값 < 평균의 특징을 갖는다'],a:0,e:'최빈값, 중앙값은 이상값에 민감하지 않으며, 평균이 이상값에 민감함'},
  {s:1,q:'다음 중 Boxplot을 통해 확인할 수 없는 것은?',o:['사분위수 범위(Interquartile Range)','이상값(Outlier)','중앙값(Median)','분산(Variance)'],a:3,e:'Boxplot을 통해 알 수 있는 것: Q1, Median, Q3, IQR, 이상값, 정상범위의 Min·Max\n분산(Variance)은 Boxplot으로 직접 확인 불가'},
  {s:1,q:'통계적 자료 분석의 결과를 왜곡시키거나 분포의 집중경향치를 왜곡시키는 변숫값을 일컫는 것은?',o:['편향','결측치','이상치','편차'],a:2,e:'이상치(Outlier): 통계적 자료 분석의 결과를 왜곡시키거나 분포의 집중경향치를 왜곡시키는 변숫값'},
  {s:1,q:'변수 선택 기법으로 올바르지 않은 것은?',o:['임베디드 기법','래퍼 기법','주성분 기법','필터 기법'],a:2,e:'변수 선택 기법: 필터 기법, 래퍼 기법, 임베디드 기법\n주성분 기법(PCA)은 변수 선택이 아닌 차원 축소 기법'},
  {s:1,q:'다음 중 추론 통계에 대한 설명으로 올바르지 않은 것은?',o:['점 추정은 표본의 정보로부터 모집단의 모수를 하나의 값으로 추정하는 것이다','구간 추정은 추정량의 분포에 대한 전제가 주어져야 하고, 구해진 구간 안에 모수가 있을 가능성의 크기(신뢰수준)가 주어져야 한다','귀무가설이 사실일 때, 관측된 검정 통계량의 값보다 더 대립가설을 지지하는 검정 통계량이 나올 확률을 p-값이라고 한다','신뢰 수준이란 추정값이 존재하는 구간에 모수가 포함되어 있을 정확도를 의미한다'],a:2,e:'P-value: 귀무가설이 옳다는 가정하에 얻은 통계량이 귀무가설을 얼마나 지지하는지를 나타낸 확률'},
  {s:1,q:'다음 중 차원의 저주에 대한 설명으로 올바르지 않은 것은?',o:['표본의 수가 적을 때 더욱 심화되며 민감하게 반응한다','차원이 증가하면서 개별 차원 내의 학습 데이터 수가 차원의 수보다 커지면서 성능이 저하되는 현상이다','데이터의 차원이 증가할수록 데이터를 표현할 수 있는 공간은 기하급수적으로 증가하는 것에 반해 데이터의 수는 변하지 않기 때문에 발생한다','모델링 과정에서 저장공간과 처리시간이 불필요하게 증가되어 성능이 저하된다'],a:1,e:'차원의 저주: 차원이 증가하면서 개별 차원 내의 학습 데이터 수가 차원의 수보다 적어지면서 성능이 저하되는 현상'},
  {s:1,q:'어떤 전구의 수명이 지수분포를 따른다. 5개의 전구 수명이 2, 3, 1, 3, 4년일 때 λ의 최대 우도추정치는?',o:['5/13','6/13','13/5','13/6'],a:0,e:'지수분포 MLE: λ = n / Σxi = 5 / (2+3+1+3+4) = 5/13'},
  {s:1,q:'시험의 평균 점수가 80점이며 분산은 36이다. 75점을 받은 학생의 Z-Score는?',o:['-0.833','-0.138','0.138','0.833'],a:0,e:'Z = (x - μ) / σ = (75 - 80) / √36 = -5/6 ≈ -0.833'},
  {s:1,q:'평균 9년, 분산 4인 정규분포를 따르는 직원 근무기간에서 13년 이상 근무한 직원의 비율은? (z=2.0일 때 P(Z≤z)=0.9772)',o:['30.85%','15.87%','6.68%','2.28%'],a:3,e:'z = (13-9)/√4 = 2\nP(X≥13) = 1 - 0.9772 = 2.28%'},
  {s:1,q:'머신러닝 수행 시 학습 데이터가 불균형한 문제를 해결할 수 있는 방법에 대한 설명으로 올바르지 않은 것은?',o:['불균형 문제를 해결하지 않으면 모델은 데이터 개수가 더 많은 클래스를 더 예측하려고 하기 때문에 정확도(Accuracy)는 낮아지고 분포가 작은 클래스의 재현율(Recall)은 높아진다','언더 샘플링은 유의미한 데이터만을 남길 수 있다는 장점이 있지만, 정보가 유실된다는 단점이 있다','오버 샘플링은 정보의 손실을 막을 수 있으나, 새로운 테스트 데이터가 추가되면 모델의 결과가 나빠진다','불균형 상태 그대로 머신러닝 모델을 통해 예측하게 된다면 과대적합 문제가 발생할 수 있다'],a:0,e:'개수가 더 많은 클래스를 더 예측하려고 하기 때문에 정확도는 높아질 수 있지만, 분포가 작은 클래스의 재현율이 낮아지는 문제가 발생'},
  {s:1,q:'불균형 데이터(imbalanced data)로 이진 분류모형을 만들 때 불균형을 해소하기 위한 방법으로 옳지 않은 것은?',o:['다수 클래스에 해당하는 데이터를 적은 수로 샘플링한다','학습 전에 클래스의 임계값을 조절한다','클래스마다 다른 가중치를 준다','소수 클래스에 해당하는 데이터를 복제하여 양을 늘린다'],a:1,e:'임계값 조절은 학습 후 평가 단계에서 사용하는 방법이지, 학습 전에 사용하는 방법이 아님'},
  {s:1,q:'데이터의 통계량과 분포 등을 통해 데이터의 형태를 확인하고, 의미 있는 관계를 찾아내는 과정을 일컫는 것은?',o:['가설검정','탐색적 데이터 분석','데이터 시각화','기술통계'],a:1,e:'탐색적 데이터 분석(EDA): 데이터의 통계량과 분포 등을 통해 데이터의 형태를 확인하고 의미 있는 관계를 찾아내는 과정'},
  {s:1,q:'모집단이 정규분포를 따른다고 할 때, 표본분포에 관한 설명 중 틀린 것은?',o:['보통 표본 n의 크기가 30보다 커지면 표본분포는 정규분포에 근사한다','표본 n의 크기가 커지면 표본오차가 커진다','모집단의 분산을 모르고 표본 n의 크기가 30보다 작으면 표본은 t-분포를 따를 것이다','모집단의 분산을 알고, 표본이 n의 크기가 30보다 크다면 표본은 Z 분포를 따를 것이다'],a:1,e:'표본 n의 크기가 커지면 표본오차는 작아진다\n표본 오차 = 임계값 × σ/√n'},
  {s:1,q:'다음 중에서 상관 분석에 대한 설명으로 올바르지 않은 것은?',o:['수치적 데이터의 상관성 분석 방법으로는 피어슨(Pearson) 상관계수가 있다','순서적 데이터의 상관성 분석에는 스피어만(Spearman) 순위 상관계수를 사용한다','세 개 이상의 변수 사이의 상관성 분석은 다변량 상관분석이다','명목적 데이터의 상관성 분석은 T-검정을 사용한다'],a:3,e:'명목적 데이터의 상관성 분석: 카이제곱 검정 이용\nT-검정은 집단의 평균 검정 또는 두 집단의 평균 차이를 비교하는 기법'},
  {s:1,q:'다음 중 두 변수의 비교 통계값으로 쓰이고 두 변수 사이의 방향성과 강도를 나타내는 것은?',o:['표준정규분포','사분위수','표준상관계수','표본표준편차'],a:2,e:'표본 상관계수: 두 변수 간 선형적 관계의 강도와 방향을 수치로 나타내는 통계량'},
  {s:1,q:'입력 필드 X만큼 Y축을 만들고 동일한 행에 있는 값을 선으로 연결하여 그리는 시각화 기법은 무엇인가?',o:['Parallel Chart','Scatter Chart','Bar Chart','Boxplot'],a:0,e:'Parallel Chart: 입력 필드 X만큼 Y축을 만들고 동일한 행에 있는 값을 선으로 연결하여 표시함'},
  {s:1,q:'다음 중 제1종 오류와 제2종 오류를 순서대로 표시한 것은? (H0가 사실일 때: 참이라 판단=a, 거짓이라 판단=b / H0가 사실 아님일 때: 참이라 판단=c, 거짓이라 판단=d)',o:['a, d','a, b','b, c','c, d'],a:2,e:'제1종 오류(α): 귀무가설이 참인데 거짓으로 판단한 경우 → b\n제2종 오류(β): 귀무가설이 거짓인데 채택하는 오류 → c'},
  {s:1,q:'다음 중 변수의 수만큼 축을 그리고 각각의 축에 측정값을 표시하는 시각화 방법은?',o:['등치선도','버블 차트','스타 차트','히트맵'],a:2,e:'스타 차트: 측정 목표에 대한 평가항목이 다수일 때 사용, 변수의 수만큼 축을 그리고 각 축에 측정값 표시'},
  {s:1,q:'다음 중 확률분포에 대한 설명으로 올바르지 않은 것은?',o:['모집단이 정규분포라는 정도만 알고 모표준편차는 모를 때 사용하는 연속확률분포는 t-분포이다','주어진 시간 안에 어떤 사건이 일어날 횟수에 대한 기댓값을 λ라고 했을 때, 그 사건이 일어날 확률을 나타내는 분포는 포아송 분포이다','연속확률분포 중 균등분포는 분포 곡선이 평균값을 중앙으로 좌우 대칭 종 모양을 이루는 분포를 포함한다','이산확률분포 중 이항분포는 두 가지 경우의 수 중 어떤 것이 나오는지를 여러 번 시행하여 성공하는 횟수를 확률변수 X로 갖는 확률분포를 의미한다'],a:2,e:'정규분포: 분포 곡선이 평균값을 중앙으로 좌우 대칭 종 모양을 이루는 분포\n균등분포는 모든 값이 동일한 확률을 가지는 분포'},
  {s:1,q:'축구 선수 연봉 데이터에서 팀별 연봉 대푯값을 산출할 때 의미 있는 통계량은? (일부 탑 플레이어의 연봉이 매우 높음)',o:['평균(Mean)','범위(Range)','중앙값(Median)','분산(Variance)'],a:2,e:'이상값에 영향을 많이 받지 않는 중앙값(Median)이 적합'},
  // 3과목 (s:2)
  {s:2,q:'입력값에 대한 라벨 데이터를 학습시켜 새로운 입력값에 대해 예측하는 방법으로 주로 분류, 회귀 문제에 활용하는 분석 방법은?',o:['비지도 학습','강화 학습','준지도 학습','지도 학습'],a:3,e:'지도학습: 분류, 회귀, 입력 + 출력(라벨 데이터)\n비지도학습: 군집, 연관, 입력 Only!'},
  {s:2,q:'다음의 예시 중 비지도 학습을 적용하기 가장 적절한 문제는?',o:['과거 기상 데이터를 활용하여 다음 날 비가 올 것인지 예측','부동산과 관련된 데이터들을 모아 주택가격을 예측','여러 페이스북 사진 중 비슷한 것끼리 묶기','비전(Vision) 검사를 통한 제품 공정 중 양품 판정'],a:2,e:'비슷한 것끼리 묶는 작업은 데이터에 대한 라벨 없이 군집분석을 적용하여 문제를 해결할 수 있음'},
  {s:2,q:'손글씨로 쓰여진 숫자에 라벨링을 하여 훈련한 뒤, 어떤 숫자인지 맞추는 모델을 만들 때 올바른 분석 방법은?',o:['분류','회귀','예측','군집'],a:0,e:'숫자 예측은 0~9의 범주를 예측하는 것이므로 분류\n회귀: 연속형 데이터 예측, 분류: 범주형 데이터 예측'},
  {s:2,q:'학생들의 교복 사이즈를 몇 개로 세분화할지 정하기 위해 키와 무게를 수집했다. 올바른 분석 방법은?',o:['분류','회귀','예측','군집'],a:3,e:'사이즈의 조건 없이 몇 개의 그룹으로 세분화 할지에 대한 것은 "군집" 기법을 사용한다'},
  {s:2,q:'데이터 분석 모델링 절차를 차례대로 작성한 것으로 옳은 것은?',o:['성능 평가 → 운영 테스트 → 모델링 마트 설계 → 탐색적 분석 → 모델링','모델링 마트 설계 → 탐색적 분석 → 모델링 → 성능 평가 → 운영 테스트','운영 테스트 → 성능 평가 → 모델링 → 탐색적 분석 → 모델링 설계','모델링 마트 설계 → 탐색적 분석 → 모델링 → 운영 테스트 → 성능 평가'],a:1,e:'데이터 분석 모델링 절차:\n모델링 마트 설계 → 탐색적 분석 → 모델링 → 성능 평가 → 운영 테스트'},
  {s:2,q:'기계학습 모델 구축 절차로 가장 적절한 것은?',o:['과제 정의 → 데이터 수집 → 모델 학습 → EDA 및 데이터 전처리 → 모델 성능 평가','과제 정의 → 데이터 수집 → EDA 및 데이터 전처리 → 모델 성능 평가 → 모델 학습','과제 정의 → 데이터 수집 → EDA 및 데이터 전처리 → 모델 학습 → 모델 성능 평가','과제 정의 → 데이터 수집 → 모델 학습 → 모델 성능 평가 → EDA 및 데이터 전처리'],a:2,e:'기계학습 모델 구축 절차:\n과제 정의 → 데이터 수집 → EDA 및 데이터 전처리 → 모델 학습 → 모델 성능 평가'},
  {s:2,q:'딥 러닝에 대한 설명 중 올바르지 않은 것은?',o:['역방향으로 오차를 전파시키면서 각 층의 가중치를 업데이트하고 최적의 학습 결과를 찾아가는 오류역전파(Error Backpropagation) 알고리즘을 사용한다','딥 러닝 분석에서는 활성화 함수로 ReLU, softmax 함수 등을 사용한다','대부분의 딥 러닝은 인공신경망 기법을 사용하기 때문에 각 히든 레이어의 가중치를 통해 모형의 결과를 해석하기 용이하다','드롭아웃은 학습 시 무작위로 유닛의 일부를 누락시켜 과적합을 방지하기 위한 방법이다'],a:2,e:'딥 러닝은 Layer가 많아 히든 레이어의 가중치를 통한 모형의 결과 해석이 쉽지 않다(블랙박스 모델)'},
  {s:2,q:'합성곱 신경망을 적용하여 입력층이 5×5인 그림에 3×3 필터를 적용. Stride=1, Padding=0일 때 결과 행렬의 크기는?',o:['2×2','3×3','4×4','5×5'],a:1,e:'결과 크기 = (입력크기 - 필터크기 + 2×Padding) / Stride + 1\n= (5 - 3 + 0) / 1 + 1 = 3 → 3×3'},
  {s:2,q:'데이터 분할 시 주의 사항으로 적절하지 않은 것은?',o:['학습데이터와 테스트데이터는 일부 겹칠 수 있다','학습데이터가 부족하면 알고리즘 학습이 어려워질 수 있다','검증 데이터와 테스트 데이터는 일치할 수 있다','불균형 데이터의 경우 불균형 범주의 비율을 유지하도록 분할하기도 한다'],a:0,e:'학습데이터와 테스트데이터는 겹칠 수 없다!'},
  {s:2,q:'다음 회귀 분석의 가정 중 오차항과 관련 없는 것은?',o:['선형성','독립성','등분산성','정규성'],a:0,e:'회귀분석 모형의 가정: 선형성, 잔차(오차)의 등분산성, 비상관성, 정규성, 독립성\n선형성은 독립변수와 종속변수 간의 관계에 대한 가정'},
  {s:2,q:'K-means 알고리즘을 사용하여 군집분석을 할 때, 최적의 군집 개수를 정하는 방법으로 옳은 것은?',o:['K-centroid 기법','와드 연결법','엘보우 기법','역전파 알고리즘'],a:2,e:'엘보우 기법: K-means에서 군집 수별 집단 내 제곱합(inertia)을 계산해 그래프로 나타낸 뒤, 감소 폭이 급격히 완만해지는 지점을 최적의 K로 선택'},
  {s:2,q:'다음 중 시계열 분해 결과로 구해지지 않는 것은?',o:['관측치','트랜드','잔차','예측값'],a:3,e:'시계열 분해결과: 관측치, 추세(트랜드), 계절성, 잔차\n예측값은 시계열 분해 결과가 아님'},
  {s:2,q:'다음 수식에 대해 옳은 설명은? RSS + α Σ|θ_i|',o:['릿지(Ridge) 회귀 분석이며, alpha 값이 커질수록 모든 가중치가 점차 0에 수렴한다','엘라스틱넷(ElasticNet)이며 L1 규제와 L2 규제를 적용했다','라쏘(Lasso) 회귀 분석이며 중요하지 않은 변수 가중치가 0이 되어 제거된다','L2 규제를 적용하였다'],a:2,e:'RSS에 회귀계수의 절대값 합을 더하는 형태 → L1 규제를 적용한 라쏘(Lasso) 회귀\n라쏘 회귀는 중요하지 않은 변수의 가중치를 0으로 만들어 변수 선택 효과를 제공'},
  {s:2,q:'다음 회귀분석 변수 선택방법 중 모든 변수가 포함되어 있는 상태에서 변수를 하나씩 제거하는 방법은?',o:['전진선택법','단계적 선택법','후진제거법','모든 가능한 조합의 선택법'],a:2,e:'후진제거법: 독립변수 후보 모두를 포함한 모형에서 출발해 하나씩 제거하면서 더 이상 유의하지 않은 변수가 없을 때까지 제거'},
  {s:2,q:'다차원척도법(MDS)에 대한 설명으로 옳지 않은 것은?',o:['개체들 사이의 유사성, 비유사성을 2차원 혹은 3차원 공간상에 점으로 표현하여 개체 사이의 군집을 시각적으로 표현하는 분석방법이다','공분산 행렬을 사용하여 고윳값이 1보다 큰 주성분의 개수를 이용한다','스트레스 값이 0에 가까울수록 적합도가 좋다','개체들의 거리는 유클리드(Euclidean) 거리와 유사도를 이용하여 구한다'],a:1,e:'공분산 행렬을 사용하여 고윳값이 1보다 큰 주성분의 개수를 이용하는 것은 주성분 분석(PCA)이다'},
  {s:2,q:'범주형인 종속변수와 수치형 변수 여러 개로 이루어진 독립변수 간의 관계를 분석하기 위해 적용할 수 있는 알고리즘으로 가장 옳은 것은?',o:['로지스틱 회귀','DBSCAN','K-means','주성분 분석'],a:0,e:'지도 학습: 종속변수를 갖음(로지스틱 회귀)\n비지도 학습: 종속변수를 갖지 않음(K-means, DBSCAN, 주성분 분석)'},
  {s:2,q:'서포트벡터머신(SVM)의 커널 함수로 Radial Basis Function(RBF)을 사용할 때 가장 적절하지 않은 것은?',o:['가우시안 커널이라고도 하며 하이퍼 파라미터로 C, gamma가 있다','하이퍼 파라미터 gamma 값이 커질수록 과적합 위험이 높아진다','사용자가 지정한 차수의 다항식을 활용하는 커널이다','고차항이 될수록 특성의 중요도는 감소한다'],a:2,e:'사용자가 지정한 차수의 다항식을 활용하는 커널 함수 → Polynomial Kernel\nRBF는 가우시안 함수를 사용하는 커널'},
  {s:2,q:'랜덤 포레스트에 대한 설명으로 옳지 않은 것은?',o:['의사결정나무를 기반으로 한 앙상블 모델이다','모델에 사용된 모형의 개수는 많을수록 좋다','별도의 변수 전처리 없이 분석이 가능하다','과적합을 방지할 수 있으며 이상치에 영향을 적게 받는다'],a:1,e:'모형의 개수가 너무 많아지면 학습 데이터에 심취하게 되어 과적합의 위험이 있음'},
  {s:2,q:'아래 신경망에서 활성화 함수로 항등함수(절편 0, 기울기 1)를 사용한다. 입력값이 (x=1, y=2)일 때 출력값은?',o:['10','11','12','13'],a:1,e:'2x+3y+6 = 14, -1x+4y+2 = 9\n14+(-9)+6 = 11'},

  {s:3,q:'다음 중 정밀도와 재현율의 조화평균으로 구해지는 평가지표는?',o:['거짓 긍정률','참 긍정률','F1-Score','결정계수'],a:2,e:'F1-Score = 2 × (Precision × Recall) / (Precision + Recall)\n정밀도와 재현율의 조화평균'},

  {s:3,q:'다음 중 NN(Neural Networks) 모형의 하이퍼 파라미터로 옳은 것은?',o:['가중치','hidden layer 수','오차','편향'],a:1,e:'하이퍼 파라미터(사용자가 지정): 학습률, 배치 크기, hidden unit, hidden layer 수\n파라미터(학습으로 결정): 가중치(weight), 편향(bias)'},

  {s:3,q:'K-Fold 교차 검증에 대한 설명으로 옳지 않은 것은?',o:['K 개의 데이터 셋을 사용한다','(K-1) 개의 데이터 셋을 학습 셋으로 사용한다','결과들을 평균을 그 모델의 성능으로 한다','하나는 검증 데이터, 나머지는 훈련 데이터로 하여 (K-1)번 반복 검증한다'],a:3,e:'K-Fold 교차 검증: 하나는 검증 데이터, 나머지는 훈련 데이터로 하여 K번 반복 검증\n(K-1)번이 아니라 K번 반복'},
  {s:3,q:'회귀 모형의 잔차를 분석한 결과가 깔대기 형태로 나타날 때, 이에 대한 설명으로 옳은 것은?',o:['잔차가 등분산 가정을 만족한다','종속변수를 log로 변환하여 문제를 해결한다','독립변수 중 하나를 제곱하여 문제를 해결한다','잔차가 정규분포를 따르지 않는다'],a:1,e:'잔차가 깔대기 형태 → 등분산 가정을 만족하지 않음(이분산성)\n종속변수를 log로 변환하여 해결할 수 있음'},

  {s:3,q:'어떤 공장에서 제품 A(50%), B(30%), C(20%)를 생산하고 불량률이 각각 1%, 2%, 3%이다. 불량품이 나온 경우 해당 제품이 A일 확률은?',o:['29.41%','35.29%','64.71%','70.59%'],a:0,e:'P(A|불량) = (0.01×0.5) / (0.01×0.5 + 0.02×0.3 + 0.03×0.2)\n= 0.005 / 0.017 ≈ 29.41%'},

// ── App State ──
let currentUser = null;
let answered = Array(Q.length).fill(null);  // 원래 답안
let retryAnswered = {};                      // 오답노트 재풀기 답안
let currentTab = 0;

// ── Password ──
function checkPw() {
  const v = document.getElementById('pw-input').value;
  if (v === 'eduatoz2014') {
    document.getElementById('pw-screen').classList.add('hidden');
    document.getElementById('id-screen').classList.remove('hidden');
    loadSavedIds();
    setTimeout(()=>document.getElementById('id-input').focus(),100);
  } else {
    shake('pw-input'); document.getElementById('pw-error').textContent='비밀번호가 올바르지 않습니다.';
    document.getElementById('pw-input').value='';
  }
}
document.getElementById('pw-input').addEventListener('keydown',e=>{ if(e.key==='Enter') checkPw(); });
document.getElementById('pw-input').focus();

// ── ID Login ──
async function loadSavedIds() {
  const keys = await Store.list('bq-id:');
  if (keys.length) {
    document.getElementById('saved-ids-wrap').style.display='block';
    document.getElementById('saved-id-list').innerHTML = keys.map(k=>{
      const id=k.replace('bq-id:','');
      return `<span class="saved-id-chip" onclick="quickLogin('${id}')">${id}</span>`;
    }).join('');
  }
}
async function quickLogin(id) {
  document.getElementById('id-input').value=id;
  await loginUser();
}
async function loginUser() {
  const id = document.getElementById('id-input').value.trim();
  if (!id) { shake('id-input'); document.getElementById('id-error').textContent='ID를 입력해 주세요.'; return; }
  currentUser = id;
  await Store.set(`bq-id:${id}`, Date.now());
  const saved = await Store.get(`bq-ans:${id}`);
  if (saved) { answered = saved.answered || answered; retryAnswered = saved.retryAnswered || {}; }
  document.getElementById('id-screen').classList.add('hidden');
  document.getElementById('user-badge').textContent = '👤 '+id;
  refresh();
}
document.getElementById('id-input').addEventListener('keydown',e=>{ if(e.key==='Enter') loginUser(); });

async function logout() {
  currentUser=null; answered=Array(Q.length).fill(null); retryAnswered={}; currentTab=0;
  document.getElementById('id-input').value=''; document.getElementById('id-error').textContent='';
  document.getElementById('id-screen').classList.remove('hidden');
  loadSavedIds();
  setTimeout(()=>document.getElementById('id-input').focus(),100);
}

async function save() {
  if (!currentUser) return;
  await Store.set(`bq-ans:${currentUser}`, { answered, retryAnswered, ts: Date.now() });
  const t=document.getElementById('toast'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800);
}

function shake(id) {
  const el=document.getElementById(id); el.classList.add('shake');
  setTimeout(()=>el.classList.remove('shake'),400);
}

// ── Helpers ──
function sqs(s) { return Q.map((q,i)=>({...q,idx:i})).filter(q=>q.s===s); }
function score(s) {
  const qs=sqs(s);
  return { correct:qs.filter(q=>answered[q.idx]===q.a).length, answered:qs.filter(q=>answered[q.idx]!==null).length, total:qs.length };
}
function wrongQs() { return Q.map((q,i)=>({...q,idx:i})).filter(q=>answered[q.idx]!==null && answered[q.idx]!==q.a); }
function wrongScore() {
  const wq=wrongQs();
  return { correct:wq.filter(q=>retryAnswered[q.idx]===q.a).length, answered:wq.filter(q=>retryAnswered[q.idx]!==undefined).length, total:wq.length };
}

// ── Render ──
function renderTabs() {
  const wq=wrongQs(), wsc=wrongScore();
  document.getElementById('tabBar').innerHTML = SUBJECTS.map((s,i)=>{
    let sc;
    if (i<4) { const c=score(i); sc=`${c.correct}/${c.total}`; }
    else sc = wq.length===0 ? '없음' : `${wsc.correct}/${wsc.total}`;
    return `<button class="tab-btn ${s.cc} ${currentTab===i?'active':''}" onclick="switchTab(${i})">
      <span>${s.emoji} ${s.label}</span><span class="tab-score">${sc}</span>
    </button>`;
  }).join('');
}

function card(q, qi, isRetry) {
  const ans = isRetry ? retryAnswered[q.idx] : answered[q.idx];
  const done = ans!==null && ans!==undefined;
  const ok = ans===q.a;
  const colors=['#f5c842','#2ee8c4','#b48bff','#ff4f72'];
  const snames=['1과목','2과목','3과목','4과목'];

  const tag = isRetry ? `<span class="q-origin-tag" style="background:${colors[q.s]}18;color:${colors[q.s]};border:1px solid ${colors[q.s]}44">${snames[q.s]}</span>` : '';

  const opts = q.o.map((opt,oi)=>{
    let cls='opt-btn';
    if(done){ if(oi===q.a) cls+=' show-correct'; if(oi===ans&&ans!==q.a) cls+=' selected-wrong'; if(oi===ans&&ans===q.a) cls='opt-btn selected-correct'; }
    const fn = isRetry ? `doRetry(${q.idx},${oi})` : `doAnswer(${q.idx},${oi})`;
    return `<button class="${cls}" ${done?'disabled':''} onclick="${fn}">
      <span class="opt-num">${oi+1}</span><span>${opt}</span>
    </button>`;
  }).join('');

  const result = done ? `<div class="result-row">
    <span>${ok?'✅':'❌'}</span>
    <span class="${ok?'result-ok':'result-ng'}">${ok?'정답입니다!':'오답 — 정답: '+(q.a+1)+'번'}</span>
  </div>
  <div class="explanation ${ok?'correct-exp':'wrong-exp'}">${q.e}</div>` : '';

  return `<div class="q-card${done?(ok?' correct':' wrong'):''}">
    <div class="q-num">Q${qi+1} ${tag}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">${opts}</div>${result}
  </div>`;
}

function renderSubject(s) {
  const qs=sqs(s), sc=score(s), prog=sc.total?sc.answered/sc.total*100:0;
  const color=['#f5c842','#2ee8c4','#b48bff','#ff4f72'][s];
  return `<div class="subject-panel active">
    <div class="subject-header">
      <div class="subject-title">${SUBJECTS[s].emoji} ${SUBJECTS[s].label} — ${SUBJECTS[s].name}</div>
      <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
        <div class="score-badge" style="color:${color}">✅ ${sc.correct} / ${sc.total} 문항</div>
        <button class="reset-btn" onclick="resetSub(${s})">초기화</button>
      </div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" style="width:${prog}%"></div></div>
    ${qs.map((q,qi)=>card(q,qi,false)).join('')}
  </div>`;
}

function renderWrong() {
  const wq=wrongQs(), wsc=wrongScore();
  if (!wq.length) return `<div class="subject-panel active"><div class="wrong-empty"><div class="big">🎉</div><div>아직 틀린 문제가 없습니다!</div><div style="font-size:0.73rem;margin-top:0.3rem">1~4과목 문제를 풀면 틀린 문제가 여기 모입니다.</div></div></div>`;
  const prog=wsc.total?wsc.answered/wsc.total*100:0;
  return `<div class="subject-panel active">
    <div class="subject-header">
      <div class="subject-title">❌ 오답노트 — 틀린 문제 다시 풀기</div>
      <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
        <div class="score-badge" style="color:#f97316">🔁 ${wsc.correct} / ${wsc.total} 재도전</div>
        <button class="reset-btn" onclick="resetRetry()">재풀기 초기화</button>
      </div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" style="width:${prog}%;background:linear-gradient(90deg,#f97316,#ff4f72)"></div></div>
    ${wq.map((q,qi)=>card(q,qi,true)).join('')}
  </div>`;
}

function refresh() {
  renderTabs();
  document.getElementById('mainContent').innerHTML = currentTab===4 ? renderWrong() : renderSubject(currentTab);
}

// ── Actions ──
async function doAnswer(idx,sel) {
  if(answered[idx]!==null) return;
  answered[idx]=sel; await save(); refresh();
}
async function doRetry(idx,sel) {
  if(retryAnswered[idx]!==undefined) return;
  retryAnswered[idx]=sel; await save(); refresh();
}
async function resetSub(s) {
  sqs(s).forEach(q=>{ answered[q.idx]=null; delete retryAnswered[q.idx]; });
  await save(); refresh();
}
async function resetRetry() { retryAnswered={}; await save(); refresh(); }
function switchTab(t) { currentTab=t; refresh(); }
</script>
</body>
</html>
