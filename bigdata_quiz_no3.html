<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빅데이터 분석기사 3회 기출 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: #0b0d14; color: #e4eaf8; min-height: 100vh; }

.overlay-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: #0b0d14;
  display: flex; align-items: center; justify-content: center;
}
.overlay-screen.hidden { display: none; }

.login-box {
  background: #151a2e; border: 1px solid #243050; border-radius: 20px;
  padding: 2.5rem 2rem; width: 100%; max-width: 400px;
  text-align: center; position: relative;
}
.login-box::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  border-radius:20px 20px 0 0;
  background:linear-gradient(90deg,#f5c842,#2ee8c4,#b48bff,#ff4f72);
}
.login-icon { font-size: 2.8rem; margin-bottom: 0.8rem; }
.login-title {
  font-size: 1rem; font-weight: 900; margin-bottom: 0.3rem;
  background: linear-gradient(120deg, #f5c842, #2ee8c4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.login-sub { font-size: 0.75rem; color: #6b7fa0; margin-bottom: 1.2rem; line-height: 1.6; }
.login-label { font-size: 0.7rem; color: #6b7fa0; text-align: left; margin-bottom: 0.3rem; margin-top: 0.8rem; }
.login-input {
  width: 100%; padding: 0.72rem 1rem;
  background: #0f1422; border: 1px solid #243050; border-radius: 10px;
  color: #e4eaf8; font-size: 0.88rem; font-family: 'Noto Sans KR', sans-serif;
  outline: none; transition: border-color 0.2s;
}
.login-input:focus { border-color: #2ee8c4; }
.login-input.shake { border-color: #ff4f72; animation: shake 0.3s ease; }
.login-btn {
  width: 100%; margin-top: 1rem; padding: 0.75rem;
  background: linear-gradient(135deg, #2ee8c4, #b48bff);
  border: none; border-radius: 10px;
  color: #0b0d14; font-size: 0.88rem; font-weight: 900;
  font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: opacity 0.2s;
}
.login-btn:hover { opacity: 0.85; }
.login-error { font-size: 0.74rem; color: #ff4f72; margin-top: 0.5rem; min-height: 1.1rem; }

.saved-ids { margin-top: 1rem; border-top: 1px solid #243050; padding-top: 0.85rem; text-align: left; }
.saved-ids-title { font-size: 0.68rem; color: #6b7fa0; margin-bottom: 0.5rem; }
.saved-id-list { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.saved-id-chip {
  padding: 0.25rem 0.7rem; border-radius: 20px;
  background: rgba(46,232,196,0.1); border: 1px solid rgba(46,232,196,0.3);
  color: #2ee8c4; font-size: 0.72rem; cursor: pointer; transition: background 0.2s;
}
.saved-id-chip:hover { background: rgba(46,232,196,0.2); }

@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

header {
  background: linear-gradient(135deg, #111828 0%, #1a2040 100%);
  border-bottom: 1px solid #243050; padding: 0.65rem 1.4rem;
  position: relative; display: flex; align-items: center; justify-content: space-between;
}
header::before {
  content:''; position:absolute; top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#f5c842,#2ee8c4,#b48bff,#ff4f72);
}
.header-left h1 {
  font-size:0.95rem;font-weight:900;
  background:linear-gradient(120deg,#f5c842,#2ee8c4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header-left p { font-size:0.68rem; color:#6b7fa0; margin-top:0.1rem; }
.header-right { display:flex; align-items:center; gap:0.5rem; flex-shrink:0; }
.user-badge {
  font-size:0.72rem; font-weight:700; color:#2ee8c4;
  background:rgba(46,232,196,0.1); border:1px solid rgba(46,232,196,0.3);
  border-radius:20px; padding:0.22rem 0.7rem; white-space:nowrap;
}
.logout-btn {
  font-size:0.68rem; color:#6b7fa0; background:none;
  border:1px solid #243050; border-radius:10px;
  padding:0.22rem 0.6rem; cursor:pointer;
  font-family:'Noto Sans KR',sans-serif; transition:all 0.2s;
}
.logout-btn:hover { color:#e4eaf8; border-color:#6b7fa0; }

.tab-bar { background:#131827; border-bottom:1px solid #243050; display:grid; grid-template-columns:repeat(5,1fr); }
.tab-btn {
  width:100%; padding:0.62rem 0.35rem;
  background:none; border:none; border-bottom:3px solid transparent;
  color:#6b7fa0; font-size:0.72rem; font-weight:700;
  font-family:'Noto Sans KR',sans-serif;
  cursor:pointer; transition:all 0.2s; white-space:nowrap;
  display:flex; flex-direction:column; align-items:center; gap:0.18rem;
}
.tab-btn:hover { color:#e4eaf8; background:rgba(255,255,255,0.03); }
.tab-btn.active.t0 { border-color:#f5c842; color:#f5c842; }
.tab-btn.active.t1 { border-color:#2ee8c4; color:#2ee8c4; }
.tab-btn.active.t2 { border-color:#b48bff; color:#b48bff; }
.tab-btn.active.t3 { border-color:#ff4f72; color:#ff4f72; }
.tab-btn.active.t4 { border-color:#f97316; color:#f97316; }
.tab-score {
  font-size:0.6rem; background:rgba(255,255,255,0.07);
  border-radius:10px; padding:0.07rem 0.42rem;
}

.content { max-width:860px; margin:0 auto; padding:1.4rem 1rem 3rem; }
.subject-panel { display:none; }
.subject-panel.active { display:block; }

.subject-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:1rem; flex-wrap:wrap; gap:0.5rem;
}
.subject-title { font-size:0.92rem; font-weight:900; }
.score-badge {
  font-size:0.76rem; font-weight:700; padding:0.25rem 0.8rem;
  border-radius:20px; background:rgba(255,255,255,0.06); border:1px solid #243050;
}
.reset-btn {
  font-size:0.68rem; padding:0.25rem 0.7rem; border-radius:12px;
  background:rgba(255,255,255,0.05); border:1px solid #243050;
  color:#6b7fa0; cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:all 0.2s;
}
.reset-btn:hover { color:#e4eaf8; border-color:#6b7fa0; }

.q-card {
  background:#151a2e; border:1px solid #243050;
  border-radius:14px; padding:1.15rem; margin-bottom:0.9rem; transition:border-color 0.3s;
}
.q-card.correct { border-color:#2ee8c4; }
.q-card.wrong { border-color:#ff4f72; }

.q-num { font-size:0.62rem; font-weight:700; color:#6b7fa0; margin-bottom:0.32rem; }
.q-origin-tag {
  display:inline-block; font-size:0.58rem; font-weight:700;
  padding:0.08rem 0.42rem; border-radius:8px; margin-left:0.35rem;
  vertical-align:middle;
}
.q-text { font-size:0.83rem; font-weight:700; line-height:1.6; margin-bottom:0.85rem; }

.options { display:flex; flex-direction:column; gap:0.42rem; }
.opt-btn {
  display:flex; align-items:flex-start; gap:0.55rem;
  padding:0.6rem 0.85rem; border-radius:10px;
  background:rgba(255,255,255,0.03); border:1px solid #243050;
  color:#c4cfe8; font-size:0.78rem; font-weight:500;
  font-family:'Noto Sans KR',sans-serif;
  cursor:pointer; text-align:left; line-height:1.5; transition:all 0.2s;
}
.opt-btn:hover:not(:disabled) { background:rgba(255,255,255,0.07); border-color:#6b7fa0; color:#fff; }
.opt-btn:disabled { cursor:default; }
.opt-num {
  min-width:19px; height:19px; border-radius:50%;
  background:#1e2540; border:1px solid #3a4565;
  display:flex; align-items:center; justify-content:center;
  font-size:0.65rem; font-weight:700; flex-shrink:0; margin-top:2px;
}
.opt-btn.selected-correct { background:rgba(46,232,196,0.12); border-color:#2ee8c4; color:#2ee8c4; }
.opt-btn.selected-correct .opt-num { background:rgba(46,232,196,0.2); border-color:#2ee8c4; color:#2ee8c4; }
.opt-btn.selected-wrong { background:rgba(255,79,114,0.1); border-color:#ff4f72; color:#ff4f72; }
.opt-btn.selected-wrong .opt-num { background:rgba(255,79,114,0.2); border-color:#ff4f72; color:#ff4f72; }
.opt-btn.show-correct { background:rgba(46,232,196,0.06); border-color:rgba(46,232,196,0.4); color:#2ee8c4; }
.opt-btn.show-correct .opt-num { background:rgba(46,232,196,0.15); border-color:#2ee8c4; color:#2ee8c4; }

.result-row { display:flex; align-items:center; gap:0.5rem; margin-top:0.65rem; font-size:0.75rem; font-weight:700; }
.result-ok { color:#2ee8c4; }
.result-ng { color:#ff4f72; }

.explanation {
  margin-top:0.7rem; padding:0.72rem 0.95rem;
  background:rgba(255,255,255,0.03); border-radius:8px;
  border-left:3px solid #6b7fa0;
  font-size:0.73rem; color:#9bacc8; line-height:1.7; white-space:pre-line;
}
.explanation.correct-exp { border-left-color:#2ee8c4; }
.explanation.wrong-exp { border-left-color:#ff4f72; }

.progress-bar-wrap { background:#1e2540; border-radius:6px; height:5px; margin-bottom:1rem; overflow:hidden; }
.progress-bar { height:100%; border-radius:6px; background:linear-gradient(90deg,#2ee8c4,#b48bff); transition:width 0.5s ease; }

.wrong-empty { text-align:center; padding:4rem 1rem; color:#6b7fa0; font-size:0.84rem; line-height:2.2; }
.wrong-empty .big { font-size:3rem; margin-bottom:0.4rem; }

#toast {
  position:fixed; bottom:1.4rem; left:50%; transform:translateX(-50%);
  background:#0d1a0d; border:1px solid #2ee8c4; color:#2ee8c4;
  font-size:0.74rem; font-weight:700; padding:0.5rem 1.1rem;
  border-radius:20px; opacity:0; pointer-events:none;
  transition:opacity 0.3s; z-index:999; white-space:nowrap;
}
#toast.show { opacity:1; }
</style>
</head>

<!-- 비밀번호 -->

    <div class="login-icon">🔐</div>

<script>
// ── Storage wrapper (localStorage 기반) ──
const Store = {
  async get(key) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch { return null; }
  },
  async set(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  },
  async list(prefix) {
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(prefix)) keys.push(k);
      }
      return keys;
    } catch { return []; }
  }
};

// ── Data ──
const SUBJECTS = [
  { label:'1과목', name:'빅데이터 기획',   emoji:'📘', cc:'t0' },
  { label:'2과목', name:'빅데이터 탐색',   emoji:'📐', cc:'t1' },
  { label:'3과목', name:'빅데이터 모델링', emoji:'🧠', cc:'t2' },
  { label:'4과목', name:'평가·활용',       emoji:'📊', cc:'t3' },
  { label:'오답노트', name:'틀린 문제 다시 풀기', emoji:'❌', cc:'t4' },
];

const Q = [
  // 1과목 (s:0)
  {s:0,q:'개인정보에 대한 동의 없이 수집 및 이용이 가능한 경우가 아닌 것은?',o:['사전 동의를 받을 수 없는 경우로서 명백히 정보주체 또는 제3자의 급박한 생명, 신체, 재산의 이익을 위하여 필요하다고 인정되는 경우','입사 지원자에 대해 회사가 범죄 이력 등을 조회하는 경우','진료기록부 작성을 위한 주소, 성명, 주민등록번호 등을 기입하는 경우','요금 부과를 위해 회사가 사용자의 정보를 조회하는 경우'],a:1,e:'입사 지원자에 대해 회사가 범죄 이력을 조회하는 것은 정보주체의 권리보다 명백히 우선하는 경우가 아님'},
  {s:0,q:'개인정보수집 시 사용자에게 고지하지 않아도 되는 사항은?',o:['개인정보수집에 대한 동의를 거부할 수 있는 권리가 있다는 사실','개인정보의 수집·이용 목적','개인정보 파기 사유','개인정보의 보유 및 이용 기간'],a:2,e:'개인정보 수집 시 필수 고지 내용: 동의 거부 권리 및 불이익, 수집·이용 목적, 수집 항목, 보유 및 이용 기간\n파기 사유는 필수 고지 항목이 아님'},
  {s:0,q:'2018년 5월 EU에서 시행된 법령으로, 정보주체의 권리와 기업의 책임성 강화 등을 주요 내용으로 하고 있는 개인정보보호법은 무엇인가?',o:['GDPR','GDP','PII','PDA'],a:0,e:'GDPR(General Data Protection Regulation): 2018년 5월 EU에서 시행된 개인정보보호법\nPII: 개인식별정보, PDA: 개인용 디지털 단말기, GDP: 국내총생산'},
  {s:0,q:'개인정보 비식별화의 처리 방법으로 올바르지 않은 것은?',o:['가명 처리','데이터 범주화','특이화','섭동'],a:2,e:'식별자 제거를 통한 비식별화 기술: 가명처리, 총계처리, 데이터 값 삭제, 데이터 범주화, 데이터 마스킹\n"특이화"는 비식별화 기술이 아님'},
  {s:0,q:'비식별화 조치에 대한 익명성 검증 방법에 대한 설명으로 올바르지 않은 것은?',o:['k-익명성: 동일한 값을 가진 레코드가 k개 이상이 되도록 하는 기법','l-다양성: 민감정보의 다양성을 낮춰 동질성의 문제를 해결하고, 배경지식을 통한 추론 가능성을 낮추는 방법','t-근접성: 준식별자의 특정 조합이 가지는 민감정보의 분포와 전체 데이터 집합의 민감정보 분포 차이를 t 이하로 만드는 방법','m-유일성: 원본 데이터와 동일한 속성값의 조합이 비식별 결과 데이터에 최소 m개 존재해야 한다'],a:1,e:'l-다양성: 민감정보의 다양성을 높여 k-익명성의 단점인 동질성 공격, 배경지식 기반 공격을 방지하기 위한 기법\n(낮추는 것이 아니라 높이는 것)'},
  {s:0,q:'분석 대상과 분석 방법을 모두 알고 있을 때 적용할 수 있는 문제 해결 방법은?',o:['최적화','솔루션','통합','발견'],a:0,e:'Optimization(최적화): 분석 대상 및 분석 방법을 이해하고 현 문제를 최적화의 형태로 수행\nSolution: 분석 방법을 모를 때, Insight: 대상 불분명·방법 앎, Discovery: 둘 다 모를 때'},
  {s:0,q:'진단 분석의 목적으로 올바른 것은?',o:['앞으로 무엇이 일어날 것인가? 언제 일어날 것인가?','현재 무엇이 일어났는가? 왜 일어났는가?','앞으로 무엇이 일어날 것인가? 왜 일어나는가?','현재 무엇이 일어났는가? 언제 재발할 것인가?'],a:1,e:'진단분석(why): 묘사 단계에서 찾아낸 분석 내용의 원인을 데이터 기반으로 이해·확인하는 과정'},
  {s:0,q:'상향식 접근 방식의 절차를 순서대로 나열한 것을 고르시오.',o:['분석요건 정의 → 분석요건 식별 → 프로세스 흐름 분석 → 프로세스 분류','프로세스 분류 → 프로세스 흐름 분석 → 분석요건 식별 → 분석요건 정의','분석요건 식별 → 프로세스 흐름 분석 → 분석요건 정의 → 프로세스 분류','프로세스 분류 → 분석요건 정의 → 프로세스 흐름 분석 → 분석요건 식별'],a:1,e:'상향식 접근 방식 절차:\n프로세스 분류 → 프로세스 흐름 분석 → 분석요건 식별 → 분석요건 정의'},
  {s:0,q:'데이터 분석 성숙도 모델에 해당하는 단계가 아닌 것은?',o:['도입','활용','확산','인프라'],a:3,e:'분석 성숙도 모델의 4단계: 도입 → 활용 → 확산 → 최적화\n"인프라"는 성숙도 단계가 아님'},
  {s:0,q:'데이터 표준 및 정책에 따라 데이터를 생성·변경하고 전사 차원의 데이터 관리 체계를 구축하는 것은?',o:['데이터 레이크','데이터 거버넌스','데이터 웨어하우스','IT 업무 혁신'],a:1,e:'데이터 거버넌스: 데이터의 품질보장, 프라이버시 보호, 데이터 수명 관리 등 전사 차원의 데이터 관리 체계를 확립하는 것'},
  {s:0,q:'다음 중 빅데이터 분석 방법론의 분석 절차 순서로 올바른 것은?',o:['분석 기획 → 데이터 준비 → 데이터 분석 → 평가 및 전개 → 시스템 구현','분석 기획 → 데이터 준비 → 데이터 분석 → 시스템 구현 → 평가 및 전개','데이터 준비 → 분석 기획 → 데이터 분석 → 시스템 구현 → 평가 및 전개','데이터 준비 → 분석 기획 → 데이터 분석 → 평가 및 전개 → 시스템 구현'],a:1,e:'빅데이터 분석 방법론의 분석 절차 순서:\n분석 기획 → 데이터 준비 → 데이터 분석 → 시스템 구현 → 평가 및 전개'},
  {s:0,q:'탐색적 데이터 분석에 대한 설명 중 틀린 것은?',o:['주어진 데이터만 가지고도 충분한 정보를 찾을 수 있도록 개발한 방법이다','탐색적 자료분석을 통해 분포 비교, 결측치/이상치 확인 등을 할 수 있다','분석 결과물로는 유의확률과 신뢰구간 등이 있다','데이터에서 특이한 점이나 의미 있는 사실을 도출하는 과정이다'],a:2,e:'탐색적 데이터 분석의 결과물: 데이터 탐색 보고서, 데이터 시각화 보고서\n유의확률과 신뢰구간은 가설검정의 결과물'},
  {s:0,q:'빅데이터 분석 프로세스에서 데이터를 이용한 분류, 예측, 군집 등의 기능을 수행할 수 있도록 하는 것을 만드는 과정을 무엇이라 하는가?',o:['모델링','탐색적 데이터 분석','차원 축소','시각화'],a:0,e:'모델링: 데이터를 이용한 분류, 예측 군집 등의 기능을 수행할 수 있도록 하는 것을 만드는 과정'},
  {s:0,q:'다음 중 데이터 유형에 따른 수집 방법으로 올바르지 않은 것은?',o:['DBMS : Crawling','웹 : FTP','센서데이터 : Open API','동영상 : Streaming'],a:0,e:'DBMS 수집 방법: Sqoop(Connector를 사용하여 RDBMS와 HDFS 사이의 데이터 전송)\nCrawling은 웹 페이지에서 데이터를 수집하는 방법'},
  {s:0,q:'비정형 데이터 처리법으로 옳지 않은 것은?',o:['음성: y=f(x)의 수식으로 변환하여 시간에 따른 값을 저장한다','텍스트: 텍스트를 토큰화 한다','웹 문서: 크롤러를 통해 웹 구조를 가져와 필요한 정보를 저장한다','사진: 픽셀별 RGB 값을 저장한다'],a:0,e:'음성: 푸리에 변환을 통해 각 진동수 성분을 스펙토그램(Spectogram)으로 저장할 수 있음'},
  {s:0,q:'다음에서 설명하는 데이터 품질 평가 요소는? (정확한 데이터 접근을 위해 오류가 입력되지 않게 하고, 정의된 기준에 맞게 유효한 값의 범위와 형식으로 되어 있는지 측정하는 지표)',o:['완전성','유용성','적시성','정확성'],a:3,e:'정확성: 정확한 데이터 접근을 위해 오류가 입력되지 않게 하고 정의된 기준에 맞게 유효한 값의 범위와 형식으로 되어 있는지 측정'},
  {s:0,q:'정형 데이터 품질에 대한 설명으로 적절한 것은?',o:['메타데이터 수집 및 분석은 데이터를 위한 데이터로 프로파일링을 수행하기 이전에 수행되며, 데이터 관리 문서로부터 수집하여 구조 및 유형을 파악한다','사전 정의 방식은 진단하려는 대상, 진단 목적 등을 고려해 측정 기준 중요도를 선정하여 활용하는 방식이다','임의적 방식은 사전에 정의된 바가 없어 통계적 분석 방법(AHP 등)을 통해 산출하는 방법이다','업무규칙 도출은 업무규칙 도출, 데이터 현상 분석, 데이터 품질 측정 순으로 진행된다'],a:0,e:'메타데이터 수집 및 분석은 프로파일링 수행 이전에 수행\n사전 정의 방식·임의적 방식은 비정형 데이터 품질 진단 방법\n업무규칙 도출 순서: 데이터 현상 분석 → 업무규칙 도출 → 데이터 품질 측정'},
  {s:0,q:'탐색적 데이터 분석에 대한 설명으로 올바르지 않은 것은?',o:['수집한 데이터를 다양한 관점에서 관찰하고 이해하는 과정이다','분석 모형에 대한 후보 모형을 선정하여 분석 효율성을 높이는 과정이다','분석에 앞서 그래프나 통계적인 방법으로 자료를 직관적으로 바라보는 과정이다','데이터를 이해하고 의미 있는 관계를 찾아내는 과정이다'],a:1,e:'분석 모형 선정은 "분석 모형 설계 과정"에 포함된 내용이지, 탐색적 데이터 분석의 목적이 아님'},
  // 2과목 (s:1)
  {s:1,q:'대푯값에 대한 설명과 특징으로 옳지 않은 것은?',o:['중앙값은 자료를 크기 순으로 나열할 때 가운데 위치한 값이며, 이상값에 민감하다','분산은 평균으로부터 얼마나 떨어져 있는지를 나타내는 값이며, 표본 분산은 자유도로 나눠서 계산한다','IQR은 제3사분위수와 제1사분위수의 차이값이며, 상자 그림을 통해 직관적으로 파악할 수 있다','왜도는 데이터 분포의 기울어진 정도를 설명하며, 왜도가 0보다 크면 최빈값 < 중앙값 < 평균의 특징을 갖는다'],a:0,e:'최빈값, 중앙값은 이상값에 민감하지 않으며, 평균이 이상값에 민감함'},
  {s:1,q:'다음 중 Boxplot을 통해 확인할 수 없는 것은?',o:['사분위수 범위(Interquartile Range)','이상값(Outlier)','중앙값(Median)','분산(Variance)'],a:3,e:'Boxplot을 통해 알 수 있는 것: Q1, Median, Q3, IQR, 이상값, 정상범위의 Min·Max\n분산(Variance)은 Boxplot으로 직접 확인 불가'},
  {s:1,q:'통계적 자료 분석의 결과를 왜곡시키거나 분포의 집중경향치를 왜곡시키는 변숫값을 일컫는 것은?',o:['편향','결측치','이상치','편차'],a:2,e:'이상치(Outlier): 통계적 자료 분석의 결과를 왜곡시키거나 분포의 집중경향치를 왜곡시키는 변숫값'},
  {s:1,q:'변수 선택 기법으로 올바르지 않은 것은?',o:['임베디드 기법','래퍼 기법','주성분 기법','필터 기법'],a:2,e:'변수 선택 기법: 필터 기법, 래퍼 기법, 임베디드 기법\n주성분 기법(PCA)은 변수 선택이 아닌 차원 축소 기법'},
  {s:1,q:'다음 중 추론 통계에 대한 설명으로 올바르지 않은 것은?',o:['점 추정은 표본의 정보로부터 모집단의 모수를 하나의 값으로 추정하는 것이다','구간 추정은 추정량의 분포에 대한 전제가 주어져야 하고, 구해진 구간 안에 모수가 있을 가능성의 크기(신뢰수준)가 주어져야 한다','귀무가설이 사실일 때, 관측된 검정 통계량의 값보다 더 대립가설을 지지하는 검정 통계량이 나올 확률을 p-값이라고 한다','신뢰 수준이란 추정값이 존재하는 구간에 모수가 포함되어 있을 정확도를 의미한다'],a:2,e:'P-value: 귀무가설이 옳다는 가정하에 얻은 통계량이 귀무가설을 얼마나 지지하는지를 나타낸 확률'},
  {s:1,q:'다음 중 차원의 저주에 대한 설명으로 올바르지 않은 것은?',o:['표본의 수가 적을 때 더욱 심화되며 민감하게 반응한다','차원이 증가하면서 개별 차원 내의 학습 데이터 수가 차원의 수보다 커지면서 성능이 저하되는 현상이다','데이터의 차원이 증가할수록 데이터를 표현할 수 있는 공간은 기하급수적으로 증가하는 것에 반해 데이터의 수는 변하지 않기 때문에 발생한다','모델링 과정에서 저장공간과 처리시간이 불필요하게 증가되어 성능이 저하된다'],a:1,e:'차원의 저주: 차원이 증가하면서 개별 차원 내의 학습 데이터 수가 차원의 수보다 적어지면서 성능이 저하되는 현상'},
  {s:1,q:'어떤 전구의 수명이 지수분포를 따른다. 5개의 전구 수명이 2, 3, 1, 3, 4년일 때 λ의 최대 우도추정치는?',o:['5/13','6/13','13/5','13/6'],a:0,e:'지수분포 MLE: λ = n / Σxi = 5 / (2+3+1+3+4) = 5/13'},
  {s:1,q:'시험의 평균 점수가 80점이며 분산은 36이다. 75점을 받은 학생의 Z-Score는?',o:['-0.833','-0.138','0.138','0.833'],a:0,e:'Z = (x - μ) / σ = (75 - 80) / √36 = -5/6 ≈ -0.833'},
  {s:1,q:'평균 9년, 분산 4인 정규분포를 따르는 직원 근무기간에서 13년 이상 근무한 직원의 비율은? (z=2.0일 때 P(Z≤z)=0.9772)',o:['30.85%','15.87%','6.68%','2.28%'],a:3,e:'z = (13-9)/√4 = 2\nP(X≥13) = 1 - 0.9772 = 2.28%'},
  {s:1,q:'머신러닝 수행 시 학습 데이터가 불균형한 문제를 해결할 수 있는 방법에 대한 설명으로 올바르지 않은 것은?',o:['불균형 문제를 해결하지 않으면 모델은 데이터 개수가 더 많은 클래스를 더 예측하려고 하기 때문에 정확도(Accuracy)는 낮아지고 분포가 작은 클래스의 재현율(Recall)은 높아진다','언더 샘플링은 유의미한 데이터만을 남길 수 있다는 장점이 있지만, 정보가 유실된다는 단점이 있다','오버 샘플링은 정보의 손실을 막을 수 있으나, 새로운 테스트 데이터가 추가되면 모델의 결과가 나빠진다','불균형 상태 그대로 머신러닝 모델을 통해 예측하게 된다면 과대적합 문제가 발생할 수 있다'],a:0,e:'개수가 더 많은 클래스를 더 예측하려고 하기 때문에 정확도는 높아질 수 있지만, 분포가 작은 클래스의 재현율이 낮아지는 문제가 발생'},
  {s:1,q:'불균형 데이터(imbalanced data)로 이진 분류모형을 만들 때 불균형을 해소하기 위한 방법으로 옳지 않은 것은?',o:['다수 클래스에 해당하는 데이터를 적은 수로 샘플링한다','학습 전에 클래스의 임계값을 조절한다','클래스마다 다른 가중치를 준다','소수 클래스에 해당하는 데이터를 복제하여 양을 늘린다'],a:1,e:'임계값 조절은 학습 후 평가 단계에서 사용하는 방법이지, 학습 전에 사용하는 방법이 아님'},
  {s:1,q:'데이터의 통계량과 분포 등을 통해 데이터의 형태를 확인하고, 의미 있는 관계를 찾아내는 과정을 일컫는 것은?',o:['가설검정','탐색적 데이터 분석','데이터 시각화','기술통계'],a:1,e:'탐색적 데이터 분석(EDA): 데이터의 통계량과 분포 등을 통해 데이터의 형태를 확인하고 의미 있는 관계를 찾아내는 과정'},
  {s:1,q:'모집단이 정규분포를 따른다고 할 때, 표본분포에 관한 설명 중 틀린 것은?',o:['보통 표본 n의 크기가 30보다 커지면 표본분포는 정규분포에 근사한다','표본 n의 크기가 커지면 표본오차가 커진다','모집단의 분산을 모르고 표본 n의 크기가 30보다 작으면 표본은 t-분포를 따를 것이다','모집단의 분산을 알고, 표본이 n의 크기가 30보다 크다면 표본은 Z 분포를 따를 것이다'],a:1,e:'표본 n의 크기가 커지면 표본오차는 작아진다\n표본 오차 = 임계값 × σ/√n'},
  {s:1,q:'다음 중에서 상관 분석에 대한 설명으로 올바르지 않은 것은?',o:['수치적 데이터의 상관성 분석 방법으로는 피어슨(Pearson) 상관계수가 있다','순서적 데이터의 상관성 분석에는 스피어만(Spearman) 순위 상관계수를 사용한다','세 개 이상의 변수 사이의 상관성 분석은 다변량 상관분석이다','명목적 데이터의 상관성 분석은 T-검정을 사용한다'],a:3,e:'명목적 데이터의 상관성 분석: 카이제곱 검정 이용\nT-검정은 집단의 평균 검정 또는 두 집단의 평균 차이를 비교하는 기법'},
  {s:1,q:'다음 중 두 변수의 비교 통계값으로 쓰이고 두 변수 사이의 방향성과 강도를 나타내는 것은?',o:['표준정규분포','사분위수','표준상관계수','표본표준편차'],a:2,e:'표본 상관계수: 두 변수 간 선형적 관계의 강도와 방향을 수치로 나타내는 통계량'},
  {s:1,q:'입력 필드 X만큼 Y축을 만들고 동일한 행에 있는 값을 선으로 연결하여 그리는 시각화 기법은 무엇인가?',o:['Parallel Chart','Scatter Chart','Bar Chart','Boxplot'],a:0,e:'Parallel Chart: 입력 필드 X만큼 Y축을 만들고 동일한 행에 있는 값을 선으로 연결하여 표시함'},
  {s:1,q:'다음 중 제1종 오류와 제2종 오류를 순서대로 표시한 것은? (H0가 사실일 때: 참이라 판단=a, 거짓이라 판단=b / H0가 사실 아님일 때: 참이라 판단=c, 거짓이라 판단=d)',o:['a, d','a, b','b, c','c, d'],a:2,e:'제1종 오류(α): 귀무가설이 참인데 거짓으로 판단한 경우 → b\n제2종 오류(β): 귀무가설이 거짓인데 채택하는 오류 → c'},
  {s:1,q:'다음 중 변수의 수만큼 축을 그리고 각각의 축에 측정값을 표시하는 시각화 방법은?',o:['등치선도','버블 차트','스타 차트','히트맵'],a:2,e:'스타 차트: 측정 목표에 대한 평가항목이 다수일 때 사용, 변수의 수만큼 축을 그리고 각 축에 측정값 표시'},
  {s:1,q:'다음 중 확률분포에 대한 설명으로 올바르지 않은 것은?',o:['모집단이 정규분포라는 정도만 알고 모표준편차는 모를 때 사용하는 연속확률분포는 t-분포이다','주어진 시간 안에 어떤 사건이 일어날 횟수에 대한 기댓값을 λ라고 했을 때, 그 사건이 일어날 확률을 나타내는 분포는 포아송 분포이다','연속확률분포 중 균등분포는 분포 곡선이 평균값을 중앙으로 좌우 대칭 종 모양을 이루는 분포를 포함한다','이산확률분포 중 이항분포는 두 가지 경우의 수 중 어떤 것이 나오는지를 여러 번 시행하여 성공하는 횟수를 확률변수 X로 갖는 확률분포를 의미한다'],a:2,e:'정규분포: 분포 곡선이 평균값을 중앙으로 좌우 대칭 종 모양을 이루는 분포\n균등분포는 모든 값이 동일한 확률을 가지는 분포'},
  {s:1,q:'축구 선수 연봉 데이터에서 팀별 연봉 대푯값을 산출할 때 의미 있는 통계량은? (일부 탑 플레이어의 연봉이 매우 높음)',o:['평균(Mean)','범위(Range)','중앙값(Median)','분산(Variance)'],a:2,e:'이상값에 영향을 많이 받지 않는 중앙값(Median)이 적합'},
  // 3과목 (s:2)
  {s:2,q:'입력값에 대한 라벨 데이터를 학습시켜 새로운 입력값에 대해 예측하는 방법으로 주로 분류, 회귀 문제에 활용하는 분석 방법은?',o:['비지도 학습','강화 학습','준지도 학습','지도 학습'],a:3,e:'지도학습: 분류, 회귀, 입력 + 출력(라벨 데이터)\n비지도학습: 군집, 연관, 입력 Only!'},
  {s:2,q:'다음의 예시 중 비지도 학습을 적용하기 가장 적절한 문제는?',o:['과거 기상 데이터를 활용하여 다음 날 비가 올 것인지 예측','부동산과 관련된 데이터들을 모아 주택가격을 예측','여러 페이스북 사진 중 비슷한 것끼리 묶기','비전(Vision) 검사를 통한 제품 공정 중 양품 판정'],a:2,e:'비슷한 것끼리 묶는 작업은 데이터에 대한 라벨 없이 군집분석을 적용하여 문제를 해결할 수 있음'},
  {s:2,q:'손글씨로 쓰여진 숫자에 라벨링을 하여 훈련한 뒤, 어떤 숫자인지 맞추는 모델을 만들 때 올바른 분석 방법은?',o:['분류','회귀','예측','군집'],a:0,e:'숫자 예측은 0~9의 범주를 예측하는 것이므로 분류\n회귀: 연속형 데이터 예측, 분류: 범주형 데이터 예측'},
  {s:2,q:'학생들의 교복 사이즈를 몇 개로 세분화할지 정하기 위해 키와 무게를 수집했다. 올바른 분석 방법은?',o:['분류','회귀','예측','군집'],a:3,e:'사이즈의 조건 없이 몇 개의 그룹으로 세분화 할지에 대한 것은 "군집" 기법을 사용한다'},
  {s:2,q:'데이터 분석 모델링 절차를 차례대로 작성한 것으로 옳은 것은?',o:['성능 평가 → 운영 테스트 → 모델링 마트 설계 → 탐색적 분석 → 모델링','모델링 마트 설계 → 탐색적 분석 → 모델링 → 성능 평가 → 운영 테스트','운영 테스트 → 성능 평가 → 모델링 → 탐색적 분석 → 모델링 설계','모델링 마트 설계 → 탐색적 분석 → 모델링 → 운영 테스트 → 성능 평가'],a:1,e:'데이터 분석 모델링 절차:\n모델링 마트 설계 → 탐색적 분석 → 모델링 → 성능 평가 → 운영 테스트'},
  {s:2,q:'기계학습 모델 구축 절차로 가장 적절한 것은?',o:['과제 정의 → 데이터 수집 → 모델 학습 → EDA 및 데이터 전처리 → 모델 성능 평가','과제 정의 → 데이터 수집 → EDA 및 데이터 전처리 → 모델 성능 평가 → 모델 학습','과제 정의 → 데이터 수집 → EDA 및 데이터 전처리 → 모델 학습 → 모델 성능 평가','과제 정의 → 데이터 수집 → 모델 학습 → 모델 성능 평가 → EDA 및 데이터 전처리'],a:2,e:'기계학습 모델 구축 절차:\n과제 정의 → 데이터 수집 → EDA 및 데이터 전처리 → 모델 학습 → 모델 성능 평가'},
  {s:2,q:'딥 러닝에 대한 설명 중 올바르지 않은 것은?',o:['역방향으로 오차를 전파시키면서 각 층의 가중치를 업데이트하고 최적의 학습 결과를 찾아가는 오류역전파(Error Backpropagation) 알고리즘을 사용한다','딥 러닝 분석에서는 활성화 함수로 ReLU, softmax 함수 등을 사용한다','대부분의 딥 러닝은 인공신경망 기법을 사용하기 때문에 각 히든 레이어의 가중치를 통해 모형의 결과를 해석하기 용이하다','드롭아웃은 학습 시 무작위로 유닛의 일부를 누락시켜 과적합을 방지하기 위한 방법이다'],a:2,e:'딥 러닝은 Layer가 많아 히든 레이어의 가중치를 통한 모형의 결과 해석이 쉽지 않다(블랙박스 모델)'},
  {s:2,q:'합성곱 신경망을 적용하여 입력층이 5×5인 그림에 3×3 필터를 적용. Stride=1, Padding=0일 때 결과 행렬의 크기는?',o:['2×2','3×3','4×4','5×5'],a:1,e:'결과 크기 = (입력크기 - 필터크기 + 2×Padding) / Stride + 1\n= (5 - 3 + 0) / 1 + 1 = 3 → 3×3'},
  {s:2,q:'데이터 분할 시 주의 사항으로 적절하지 않은 것은?',o:['학습데이터와 테스트데이터는 일부 겹칠 수 있다','학습데이터가 부족하면 알고리즘 학습이 어려워질 수 있다','검증 데이터와 테스트 데이터는 일치할 수 있다','불균형 데이터의 경우 불균형 범주의 비율을 유지하도록 분할하기도 한다'],a:0,e:'학습데이터와 테스트데이터는 겹칠 수 없다!'},
  {s:2,q:'다음 회귀 분석의 가정 중 오차항과 관련 없는 것은?',o:['선형성','독립성','등분산성','정규성'],a:0,e:'회귀분석 모형의 가정: 선형성, 잔차(오차)의 등분산성, 비상관성, 정규성, 독립성\n선형성은 독립변수와 종속변수 간의 관계에 대한 가정'},
  {s:2,q:'K-means 알고리즘을 사용하여 군집분석을 할 때, 최적의 군집 개수를 정하는 방법으로 옳은 것은?',o:['K-centroid 기법','와드 연결법','엘보우 기법','역전파 알고리즘'],a:2,e:'엘보우 기법: K-means에서 군집 수별 집단 내 제곱합(inertia)을 계산해 그래프로 나타낸 뒤, 감소 폭이 급격히 완만해지는 지점을 최적의 K로 선택'},
  {s:2,q:'다음 중 시계열 분해 결과로 구해지지 않는 것은?',o:['관측치','트랜드','잔차','예측값'],a:3,e:'시계열 분해결과: 관측치, 추세(트랜드), 계절성, 잔차\n예측값은 시계열 분해 결과가 아님'},
  {s:2,q:'다음 수식에 대해 옳은 설명은? RSS + α Σ|θ_i|',o:['릿지(Ridge) 회귀 분석이며, alpha 값이 커질수록 모든 가중치가 점차 0에 수렴한다','엘라스틱넷(ElasticNet)이며 L1 규제와 L2 규제를 적용했다','라쏘(Lasso) 회귀 분석이며 중요하지 않은 변수 가중치가 0이 되어 제거된다','L2 규제를 적용하였다'],a:2,e:'RSS에 회귀계수의 절대값 합을 더하는 형태 → L1 규제를 적용한 라쏘(Lasso) 회귀\n라쏘 회귀는 중요하지 않은 변수의 가중치를 0으로 만들어 변수 선택 효과를 제공'},
  {s:2,q:'다음 회귀분석 변수 선택방법 중 모든 변수가 포함되어 있는 상태에서 변수를 하나씩 제거하는 방법은?',o:['전진선택법','단계적 선택법','후진제거법','모든 가능한 조합의 선택법'],a:2,e:'후진제거법: 독립변수 후보 모두를 포함한 모형에서 출발해 하나씩 제거하면서 더 이상 유의하지 않은 변수가 없을 때까지 제거'},
  {s:2,q:'다차원척도법(MDS)에 대한 설명으로 옳지 않은 것은?',o:['개체들 사이의 유사성, 비유사성을 2차원 혹은 3차원 공간상에 점으로 표현하여 개체 사이의 군집을 시각적으로 표현하는 분석방법이다','공분산 행렬을 사용하여 고윳값이 1보다 큰 주성분의 개수를 이용한다','스트레스 값이 0에 가까울수록 적합도가 좋다','개체들의 거리는 유클리드(Euclidean) 거리와 유사도를 이용하여 구한다'],a:1,e:'공분산 행렬을 사용하여 고윳값이 1보다 큰 주성분의 개수를 이용하는 것은 주성분 분석(PCA)이다'},
  {s:2,q:'범주형인 종속변수와 수치형 변수 여러 개로 이루어진 독립변수 간의 관계를 분석하기 위해 적용할 수 있는 알고리즘으로 가장 옳은 것은?',o:['로지스틱 회귀','DBSCAN','K-means','주성분 분석'],a:0,e:'지도 학습: 종속변수를 갖음(로지스틱 회귀)\n비지도 학습: 종속변수를 갖지 않음(K-means, DBSCAN, 주성분 분석)'},
  {s:2,q:'서포트벡터머신(SVM)의 커널 함수로 Radial Basis Function(RBF)을 사용할 때 가장 적절하지 않은 것은?',o:['가우시안 커널이라고도 하며 하이퍼 파라미터로 C, gamma가 있다','하이퍼 파라미터 gamma 값이 커질수록 과적합 위험이 높아진다','사용자가 지정한 차수의 다항식을 활용하는 커널이다','고차항이 될수록 특성의 중요도는 감소한다'],a:2,e:'사용자가 지정한 차수의 다항식을 활용하는 커널 함수 → Polynomial Kernel\nRBF는 가우시안 함수를 사용하는 커널'},
  {s:2,q:'랜덤 포레스트에 대한 설명으로 옳지 않은 것은?',o:['의사결정나무를 기반으로 한 앙상블 모델이다','모델에 사용된 모형의 개수는 많을수록 좋다','별도의 변수 전처리 없이 분석이 가능하다','과적합을 방지할 수 있으며 이상치에 영향을 적게 받는다'],a:1,e:'모형의 개수가 너무 많아지면 학습 데이터에 심취하게 되어 과적합의 위험이 있음'},
  {s:2,q:'아래 신경망에서 활성화 함수로 항등함수(절편 0, 기울기 1)를 사용한다. 입력값이 (x=1, y=2)일 때 출력값은?',o:['10','11','12','13'],a:1,e:'2x+3y+6 = 14, -1x+4y+2 = 9\n14+(-9)+6 = 11'},
  {s:2,q:'다음 중 인공신경망의 출력 값 도출을 위해 조절해야 하는 값으로 옳은 것은?',o:['커널 값','뉴런 값','가중치','오차'],a:2,e:'인공신경망: Forward propagation에서 입력값에 가중치를 곱하여 그 합을 이용\nBackward propagation에서 weight(가중치)를 수정해 가면서 학습이 이루어짐'},
  {s:2,q:'로지스틱 회귀모델에 대한 설명으로 적절하지 않은 것은?',o:['로지스틱 회귀분석은 정규분포를 따른다','로지스틱 회귀분석의 경우, 0~1 사이의 값을 갖는다','로지스틱 회귀분석의 목표변수는 범주형이다','로지스틱 회귀분석의 시그모이드 함수식은 y=1/(1+e^(-x))이다'],a:0,e:'로지스틱 회귀분석: Classification, 이항분포, 종속변수는 범주형, 0~1 사이의 값\n선형 회귀분석: Regression, 정규분포, 종속변수는 연속형'},
  // 4과목 (s:3)
  {s:3,q:'다음 중 분류 모형이 예측한 값과 실제 값의 조합을 표 형태로 나타낸 것은?',o:['확률분포표','적합도 검정','분류표','혼동행렬'],a:3,e:'혼동행렬(Confusion Matrix): 분류 모형이 예측한 값과 실제 값의 조합을 표 형태로 나타낸 것\nTP, TN, FP, FN으로 구성'},
  {s:3,q:'다음 중 정밀도와 재현율의 조화평균으로 구해지는 평가지표는?',o:['거짓 긍정률','참 긍정률','F1-Score','결정계수'],a:2,e:'F1-Score = 2 × (Precision × Recall) / (Precision + Recall)\n정밀도와 재현율의 조화평균'},
  {s:3,q:'암 진단 혼동행렬에서 FP와 TP의 확률을 계산하시오. (0을 Positive로 함)\n(실제0 예측0: 45, 실제0 예측1: 5, 실제1 예측0: 15, 실제1 예측1: 35)',o:['TP : 9/10, FP : 3/10','TP : 9/10, FP : 7/10','TP : 1/10, FP : 3/10','TP : 3/10, FP : 7/10'],a:0,e:'0을 Positive로 정의\nTP(Sensitivity) = 45/50 = 9/10\nFP(1-특이도) = 15/50 = 3/10'},
  {s:3,q:'다음 중 혼동행렬을 활용해 계산할 수 없는 것은?',o:['정분류율','특이도','F1-Score','AUC'],a:3,e:'AUC: Area Under Curve로 ROC Curve를 사용하여 구할 수 있음\nROC Curve는 혼동행렬만으로는 그릴 수 없고 임계값 변화에 따른 여러 혼동행렬이 필요'},
  {s:3,q:'모수 유의성 검정에 대한 설명으로 옳은 것을 모두 고르시오. (가: 표본 데이터가 반드시 정규분포를 따라야 한다. 나: 모집단의 평균·분산 등 모수에 대한 가설을 검정한다. 다: 대표적인 방법으로 t-검정, Z-검정, ANOVA 등이 있다. 라: 데이터의 분포에 대한 가정이 없어도 사용할 수 있다. 마: 표본 데이터를 이용하여 모집단의 특성을 추론한다.)',o:['가, 나, 다','나, 다, 마','가, 라, 마','나, 다, 라'],a:1,e:'가: 반드시 정규분포를 따라야 하는 것은 아님(중심극한정리)\n라: 분포에 대한 가정이 없는 것은 비모수 검정\n나, 다, 마가 올바른 설명'},
  {s:3,q:'ROC Curve에 대한 설명으로 올바르지 않은 것은?',o:['민감도가 0, 특이도가 1인 점을 지난다','민감도가 1, 특이도가 0인 점을 지난다','특이도가 증가하는 그래프이다','가장 이상적인 그래프는 민감도가 1, 특이도가 1인 점을 지난다'],a:2,e:'ROC Curve의 x축은 FPR(=1-특이도)이며, FPR이 증가하는 방향으로 그려지는 그래프\n따라서 x축을 따라 이동할수록 특이도는 감소하는 방향'},
  {s:3,q:'혼동행렬에서의 FN 해석에 대한 것으로 알맞은 것은?',o:['예측값 False, 실제값 False','예측값 True, 실제값 False','예측값 False, 실제값 True','예측값 True, 실제값 True'],a:2,e:'FN: 첫 번째 글자(F)는 틀렸음, 두 번째 글자(N)는 예측이 Negative(=False)임\n즉, 실제는 True인데 Negative로 예측(틀림) → 예측값 False, 실제값 True'},
  {s:3,q:'다음 중 데이터 불균형이 있을 경우 사용하는 평가지표로 가장 옳지 않은 것은?',o:['민감도','정확도','ROC Curve','F1 Score'],a:1,e:'정확도: 불균형한 레이블 값 분포의 데이터에서는 모델의 성능이 실제로 좋지 못하더라도 정확도가 높을 수 있음'},
  {s:3,q:'다음 중 빅데이터 분석 시각화 방법 중 성격이 다른 하나는?',o:['막대 그래프','파이 차트','도넛 차트','트리맵 차트'],a:0,e:'막대 그래프: 시간에 따른 값의 변화나 범주형 변수의 탐색에 주로 사용\n파이 차트, 도넛 차트, 트리맵 차트: 범주형 변수의 구성(비율) 시각화에 사용'},
  {s:3,q:'다음 중 NN(Neural Networks) 모형의 하이퍼 파라미터로 옳은 것은?',o:['가중치','hidden layer 수','오차','편향'],a:1,e:'하이퍼 파라미터(사용자가 지정): 학습률, 배치 크기, hidden unit, hidden layer 수\n파라미터(학습으로 결정): 가중치(weight), 편향(bias)'},
  {s:3,q:'다음 중 인공신경망 모형에 대한 매개변수와 하이퍼 파라미터에 대한 설명으로 옳은 것은?',o:['대표적인 매개변수에는 가중치가 있다','학습률은 학습과정에 따라 자동으로 학습된다','배치 크기는 파라미터의 일종이다','hidden unit 수는 사용자가 지정할 수 없다'],a:0,e:'파라미터(매개변수): 가중치(weight)\n하이퍼파라미터: 학습률, 배치크기, hidden unit, hidden layer 수'},
  {s:3,q:'다음 중 편향과 분산에 대한 설명으로 옳은 것은?',o:['모형의 학습을 계속 수행하며 분산과 편향의 Trade-off 덕분에 전체 Error가 점차 줄어든다','모형이 복잡해 질수록 분산은 작아지고 편향은 커진다','모형이 단순해 질수록 편향은 작아지고 분산은 커진다','편향과 분산이 모두 낮아 전체 Error가 최소인 모형을 선정한다'],a:3,e:'모형이 복잡해질수록 분산은 커지고 편향은 작아짐\n편향과 분산이 모두 낮아 전체 Error가 최소인 모형을 선정'},
  {s:3,q:'데이터를 학습 세트, 검증 세트, 시험 세트 세 가지로 분할하는 방법을 일컫는 것은?',o:['K-Fold','Hold out','Drop out','Cross Validation'],a:1,e:'Hold-Out: 학습 데이터와 테스트 데이터를 2개 또는 3개로 분리\nK-Fold: K개로 분리해 K-1개는 학습용, 1개는 테스트용\nDropout: 딥러닝에서 과대적합 방지 기법'},
  {s:3,q:'K-Fold 교차 검증에 대한 설명으로 옳지 않은 것은?',o:['K 개의 데이터 셋을 사용한다','(K-1) 개의 데이터 셋을 학습 셋으로 사용한다','결과들을 평균을 그 모델의 성능으로 한다','하나는 검증 데이터, 나머지는 훈련 데이터로 하여 (K-1)번 반복 검증한다'],a:3,e:'K-Fold 교차 검증: 하나는 검증 데이터, 나머지는 훈련 데이터로 하여 K번 반복 검증\n(K-1)번이 아니라 K번 반복'},
  {s:3,q:'회귀 모형의 잔차를 분석한 결과가 깔대기 형태로 나타날 때, 이에 대한 설명으로 옳은 것은?',o:['잔차가 등분산 가정을 만족한다','종속변수를 log로 변환하여 문제를 해결한다','독립변수 중 하나를 제곱하여 문제를 해결한다','잔차가 정규분포를 따르지 않는다'],a:1,e:'잔차가 깔대기 형태 → 등분산 가정을 만족하지 않음(이분산성)\n종속변수를 log로 변환하여 해결할 수 있음'},
  {s:3,q:'다음 중 인포그래픽에 대한 설명으로 옳지 않은 것은?',o:['다양한 정보를 그래픽으로 나타내는 방법이다','도표, 글에 비해 사람들의 기억에 잘 남는다','대규모의 빅데이터 분석 결과를 나타내는 경우 복잡하고 이해하기 어려울 수 있다','주장하는 바를 알리는 데도 사용할 수 있다'],a:2,e:'인포그래픽을 사용하면 대규모 빅데이터 분석 결과를 명료하고 이해하기 쉽게 표현할 수 있음'},
  {s:3,q:'다음 중 카이제곱 적합도 검정에 대한 설명으로 옳지 않은 것은?',o:['기대도수는 귀무가설에 따라 계산된다','귀무가설이 기각되면 기대도수 합은 관측도수와 다르다','기대도수와 관측도수의 차이가 커지면 카이제곱 통계량도 커진다','카이제곱 통계량은 기대도수와 관측도수를 이용하여 계산한다'],a:1,e:'기대도수는 관측도수의 총합에 범주별 확률을 곱해 구해지므로 귀무가설의 기각 여부에 상관 없이 기대도수의 합과 관측도수의 합은 같다'},
  {s:3,q:'어떤 공장에서 제품 A(50%), B(30%), C(20%)를 생산하고 불량률이 각각 1%, 2%, 3%이다. 불량품이 나온 경우 해당 제품이 A일 확률은?',o:['29.41%','35.29%','64.71%','70.59%'],a:0,e:'P(A|불량) = (0.01×0.5) / (0.01×0.5 + 0.02×0.3 + 0.03×0.2)\n= 0.005 / 0.017 ≈ 29.41%'},
  {s:3,q:'다음 중 ROC Curve에 대한 설명으로 옳지 않은 것은?',o:['AUC(Area Under Curve)는 곡선의 아래 면적을 의미한다','그래프의 중간선과 곡선이 동일할 때 가장 우수한 성능이다','ROC Curve의 AUC가 클 수록 좋은 성능의 모형이라 할 수 있다','ROC Curve는 분류분석 성능 평가를 위한 도구이다'],a:1,e:'ROC Curve가 대각선과 동일하면 AUC=0.5로 랜덤 분류기와 같은 성능\n가장 이상적인 ROC Curve는 AUC=1에 가까운 것'},

  // ── 3회 1과목 (s:5) ──
  {s:5,q:'가트너가 정의한 빅데이터 처리 플랫폼 특징 3V에 속하지 않는 것은?',o:['규모(Volume)','변환성(Variation)','속도(Velocity)','다양성(Variety)'],a:1,e:'가트너가 정의한 빅데이터 처리 플랫폼 특징 3V: Volume(규모), Velocity(속도), Variety(다양성)\n변환성(Variation)은 3V에 해당하지 않음'},
  {s:5,q:'일반적인 데이터 분석가와 비교하여 데이터 사이언티스트의 역량에 해당하지 않는 것은?',o:['비즈니스 문제를 새롭게 정의하고 그것을 풀 수 있는 문제로 변환하는 능력','풀 수 있는 문제로 변환한 비즈니스 문제를 IT 및 소프트웨어 역량을 활용하여 체계적이고 자동적으로 분석 및 해결하는 능력','데이터 가공 과정을 소프트웨어를 활용해 자동적으로 구현하고 필요한 데이터를 만들기 위한 시스템을 개발하는 능력','IT 및 소프트웨어 역량을 활용하여 비즈니스 문제 해결을 위한 데이터 수집, 분석 및 가공 단계와 프로세스를 설계하고 구현하는 능력'],a:2,e:'데이터 가공 과정을 소프트웨어를 활용해 자동적으로 구현하고 필요한 데이터를 만들기 위한 시스템을 개발하는 능력은 소프트웨어 개발 엔지니어의 역량이다.'},
  {s:5,q:'다음 중 HDFS에 저장된 빅데이터에 대해 ETL 작업을 수행할 수 있는 하둡 기반 시스템은?',o:['HBase','Oozie','Tajo','Pig'],a:2,e:'Tajo: 하둡 기반 분산 SQL 엔진으로, HDFS에 저장된 구조화 데이터를 대상으로 SQL 기반의 ETL 작업 수행\nHBase: 컬럼 기반 분산 데이터베이스, Oozie: 워크플로우 스케줄러, Pig: 대용량 데이터 처리 스크립트 시스템'},
  {s:5,q:'기존의 기계적 학습 알고리즘과 비교했을 때 빅데이터 기반 인공지능의 장점으로 거리가 먼 것은?',o:['일정 문제 영역에서 인간의 통찰력을 활용하여 필요한 특징을 직접 설정할 수 있다','현대적 컴퓨터 기술의 발전과 함께 대규모 데이터 집합의 효율적 처리가 가능하다','시각 지능과 같은 특정 영역에서는 인간 수준 혹은 그 이상의 지식 체계 구현이 가능하다','다른 영역의 문제로 지식을 확장할 수 있다'],a:0,e:'인공지능은 일정 문제 영역에서 인간의 통찰력에 대한 개입 없이 필요한 특징을 자동으로 설정할 수 있어야 한다\n인간의 통찰력을 활용하여 직접 설정하는 것은 기존 기계학습 방식의 한계'},
  {s:5,q:'개인정보 처리법에 따른 개인정보처리 원칙으로 거리가 먼 것은?',o:['개인정보처리자는 개인정보의 처리 목적을 명확하게 하여야 하고 그 목적에 필요한 범위에서 최소한의 개인정보만 적법하고 정당하게 수집해야 한다','개인정보처리자는 개인정보를 익명으로 처리하여도 개인정보 수집 목적을 달성할 수 있는 경우라도 가명에 의하여 처리하여야 한다','개인정보처리자는 개인정보의 처리 방법 및 종류 등에 따라 정보 주체의 권리가 침해 받을 가능성과 그 위험 정도를 고려하여 개인정보를 안전하게 관리하여야 한다','개인정보처리자는 개인정보의 처리 목적에 필요한 범위에서 적합하게 개인정보를 처리하여야 하며, 그 목적 외의 용도로 활용해서는 안 된다'],a:1,e:'개인정보를 익명 또는 가명으로 처리하여도 목적을 달성할 수 있는 경우 익명처리가 가능하면 익명에 의하여, 익명처리로 목적을 달성할 수 없는 경우에는 가명에 의하여 처리될 수 있도록 하여야 한다'},
  {s:5,q:'다음 중 민감정보에 해당하지 않는 것은?',o:['건강정보','정치적 견해','사상과 신념','취미 생활'],a:3,e:'민감정보: 특정 개인의 건강정보, 사상 및 신념, 정치적 견해 등\n취미 생활은 민감정보에 해당하지 않음'},
  {s:5,q:'개인정보 비식별화의 처리 방법으로 올바르지 않은 것은?',o:['가명 처리','데이터 범주화','특이화','섭동'],a:2,e:'식별자 제거를 통한 비식별화 기술: 가명처리, 총계처리, 데이터 값 삭제, 데이터 범주화, 데이터 마스킹\n특이화는 비식별화 기술이 아님'},
  {s:5,q:'다음 중 재현자료(Synthetic Data)에 대한 설명 및 특징으로 올바르지 않은 것은?',o:['재현자료는 실제로 측정된 데이터를 생성하는 모형이 존재한다고 가정하고 추정된 모형에서 새롭게 생성한 데이터이다','모집단의 통계적 특성들을 유지하면서도 민감한 정보를 외부에 직접 공개하지 않는다','개인이 제공한 데이터가 아닌 임의로 생성한 데이터로 개인정보보호 관련 법규의 규제 제약사항이 있다','베이지안 방법이나 기계학습 모형을 통해 재현자료를 생성한다'],a:2,e:'재현자료는 임의로 생성한 데이터이기 때문에 개인정보보호법으로부터 자유롭다\n개인정보보호 관련 법규의 규제 제약사항이 있다는 설명이 틀림'},
  {s:5,q:'다음 보기에서 설명하는 것은 무엇인가? (A 기업이 보유한 이용자의 개인정보를 B 기업이 활용하려면 원칙적으로 이용자의 동의가 필요하다. 하지만 이 제도를 활용하면, B 기업이 이용자에게 직접 동의를 받아 A 기업에 개인정보 제공을 요청할 수 있다.)',o:['개인정보 동의 간소화','기업 간 정보 공유','개인 정보 포털','마이 데이터'],a:3,e:'마이데이터: 정보의 주체가 개인정보 권한을 가지고 자신의 개인정보를 직접 관리\nB기업이 이용자에게 직접 동의를 구해 A기업에 개인정보 제공을 요청할 수 있음'},
  {s:5,q:'데이터 분석 기획 시 고려해야 할 사항으로 적절하지 않은 것은?',o:['분석 수행 시 발생하는 장애요소들에 대한 사전 계획 수립','분석을 통해 가치가 창출될 수 있는 적절한 활용 방안과 유즈케이스 탐색','분석의 기본인 가용 데이터에 대한 고려','분석 분야 및 결론에 대한 사전 시나리오 확정'],a:3,e:'분석 기획 시 고려 사항: 가용한 데이터, 적절한 유스케이스 탐색, 장애요소들에 대한 사전 계획 수립\n분석 결론을 사전에 확정하는 것은 적절하지 않음'},
  {s:5,q:'분석 문제 정의 단계에서 수행하는 내용에 대한 설명으로 옳지 않은 것은?',o:['분석 문제 정의의 주체로 개인과 조직을 나누어 고려한다','데이터 분석 주기는 분석 단계에서 결정될 수 있으므로 이 단계에서는 고려하지 않는다','데이터의 규모와 정형·비정형 여부를 파악한다','데이터 분석을 통해 달성하고자 하는 목표를 설정한다'],a:1,e:'분석 문제 정의 단계에서 고려사항: 분석 주체(개인/조직), 데이터 크기·형태·존재 여부·분석 주기, 달성 목표\n데이터 분석 주기도 이 단계에서 고려해야 함'},
  {s:5,q:'분석 마스터 플랜에 대한 설명으로 옳은 것은?',o:['분석 마스터 플랜은 분석 목표를 기반으로 분석 과제를 수행하기 위해 필요한 기준 등을 담아 만든 종합적인 계획이다','단계별로 추진하고자 하는 목표를 명확하게 정의하고, 추진 과제별 선행 관계를 고려하여 단계별 추진 내용을 정렬한다','분석 마스터 플랜 과정에서는 전략적 중요도, 비즈니스 성과와 ROI 및 분석 과제의 실행 용이성을 고려하여 과제의 우선 순위 기준을 설정한다','데이터 수집 및 확보와 분석 데이터 준비 단계는 순차적으로 진행하고 모델링 단계는 반복적으로 수행한다'],a:2,e:'분석 마스터 플랜: 전략적 중요도, 비즈니스 성과와 ROI, 분석 과제의 실행 용이성을 고려하여 과제의 우선 순위 기준을 설정\n1, 2, 4번의 내용은 분석 로드맵 설정에 대한 설명'},
  {s:5,q:'다음 중 빅데이터 분석 방법론의 분석 절차 순서로 올바른 것은?',o:['분석 기획 → 데이터 준비 → 데이터 분석 → 평가 및 전개 → 시스템 구현','분석 기획 → 데이터 준비 → 데이터 분석 → 시스템 구현 → 평가 및 전개','데이터 준비 → 분석 기획 → 데이터 분석 → 시스템 구현 → 평가 및 전개','데이터 준비 → 분석 기획 → 데이터 분석 → 평가 및 전개 → 시스템 구현'],a:1,e:'빅데이터 분석 방법론의 분석 절차 순서:\n분석 기획 → 데이터 준비 → 데이터 분석 → 시스템 구현 → 평가 및 전개'},
  {s:5,q:'빅데이터 분석 방법론의 분석 절차 중 "프로젝트 진행을 위한 방향성을 설정하고, 비즈니스 문제에 대한 과제 현상을 파악하며, 실제 분석을 수행할 과제의 정의 및 의도했던 결과를 도출할 수 있도록 관리할 수 있는 방안을 사전에 계획하는 작업"에 해당하는 단계는?',o:['분석 기획','분석 로드맵 설정','분석 문제 정의','분석 마스터 플랜'],a:0,e:'분석 기획: 프로젝트 진행을 위한 방향성 설정, 비즈니스 문제에 대한 과제 현상 파악, 분석 과제의 정의 및 의도했던 결과를 도출할 수 있도록 관리할 수 있는 방안을 사전에 계획하는 작업'},
  {s:5,q:'데이터 분석 시 고려사항으로 적절하지 않은 것은?',o:['데이터 분석은 분석 기술과 방법론을 기반으로 여러 형태의 데이터를 구축, 탐색, 분석 및 시각화까지 수행하는 것이다','데이터 분석은 규모가 아니라 어떤 시각과 통찰을 얻을 수 있는가의 문제이다','분석 결과를 사전에 가정하고 정의하여, 목적에 맞는 탐색적 데이터 분석을 진행해야 한다','데이터 분석을 수행하기 위한 분석적 방법과 성과에 대한 이해의 부족을 지양해야 한다'],a:2,e:'탐색적 분석은 전략적 통찰을 기반으로 열린 시각으로 진행되어야 한다\n분석 결과를 사전에 가정하고 정의하여 분석하는 일차원적인 데이터 분석은 지양해야 한다'},
  {s:5,q:'데이터 분석 방법론의 데이터 분석 과정에서 수행하는 업무가 아닌 것은?',o:['텍스트 데이터 확인 및 추출','탐색적 데이터 분석 및 데이터 시각화','모델 평가 및 모델 검증','데이터 수집, 저장 및 정합성 검증'],a:3,e:'데이터 분석 과정: 텍스트 데이터 확인·추출, 탐색적 데이터 분석·시각화, 모델 평가·검증\n데이터 수집, 저장 및 정합성 검증은 데이터 준비 단계에서 수행'},
  {s:5,q:'다음 중 고품질 데이터의 특성이 아닌 것은?',o:['정확성(Accuracy)','불편의성(Unbiasedness)','적시성(Timeliness)','일관성(Consistency)'],a:1,e:'데이터 품질 지표: 준비성, 완전성, 일관성, 정확성, 보안성, 적시성, 유용성 등\n불편의성(Unbiasedness)은 고품질 데이터의 특성이 아님'},
  {s:5,q:'다음 데이터 품질 유형 중 정확성, 객관성, 진정성 등 데이터 자체의 우수성을 나타내는 것은?',o:['접근성 품질','상황적 품질','표현적 품질','내재적 품질'],a:3,e:'내재적 품질: 정확성, 객관성, 진정성 등 데이터 자체의 우수성\n접근성 품질: 접근성·접근 보안성 등\n상황적 품질: 연관성·완전성 등 상황에 적합성\n표현적 품질: 해석력·간결성·일관성 등 표현의 명확성'},
  {s:5,q:'하나 이상의 데이터소스로부터 정형 데이터를 추출 및 가공하여 데이터 웨어하우스 등 다양한 응용시스템에 저장하는 기술은?',o:['FTP','ETL','RSS','Kafka'],a:1,e:'ETL: 하나 이상의 데이터소스로부터 정형 데이터를 추출 및 가공하여 Data Warehouse 등 다양한 응용시스템에 저장하는 기술\nFTP: 파일 전송, RSS: XML 기반 콘텐츠 배급 프로토콜, Kafka: 분산 메시징 처리'},
  {s:5,q:'빅데이터 정보 관리 중 HBase, Cassandra와 같이 비정형 및 반정형 데이터 처리에 가장 유용한 것은?',o:['인 메모리 데이터 관리 기술','분산 파일 시스템','NoSQL','RDBMS'],a:2,e:'NoSQL: MongoDB, Apache HBase, Redis, Cassandra\n비관계형 데이터베이스 관리 시스템, 높은 수평적 확장성, Key-Value 형태로 자료 저장, 스키마 없이 동작'},
  {s:5,q:'트랜잭션 중심의 데이터베이스와 비교하여 데이터 웨어하우스를 설명하는 것으로 옳지 않은 것은?',o:['소멸성(Volatile)','통합성(Integrated)','주제 지향성(Subject Oriented)','시간에 따른 변화(Time-variant)'],a:0,e:'Data Warehouse의 특징: 데이터의 통합, 시계열성(시간에 따른 변화), 주제 지향적, 비소멸성(비휘발성)\n소멸성(Volatile)이 아니라 비소멸성(Non-Volatile)이 특징'},
  // ── 3회 2과목 (s:6) ──
  {s:6,q:'데이터 정제에 대한 설명으로 올바른 것은?',o:['노이즈와 이상값은 비정형 데이터보다는 정형 데이터에서 자주 발생하므로 데이터 특성에 맞는 정제 규칙을 수립하여 점검해야 한다','데이터 정제 과정은 데이터 분석 과정에서 반드시 수행할 필요는 없다','데이터 정제는 결측값을 채우거나 이상값을 제거하는 과정을 통해 데이터의 신뢰도를 높이는 작업이다','모든 데이터를 대상으로 정제 활동을 수행하지는 않는다'],a:2,e:'데이터 정제: 결측값을 채우거나 이상값을 제거하는 과정을 통해 데이터의 신뢰도를 높이는 작업\n노이즈와 이상값은 반정형·비정형 데이터에 보다 많이 발생\n데이터 정제 과정은 반드시 수행해야 하며, 모든 데이터를 대상으로 수행'},
  {s:6,q:'이상값에 대한 설명으로 올바르지 않은 것은?',o:['데이터 측정 중에 발생하는 오류로 인해 생성된 값은 이상값으로 정의하여 처리할 수 없다','정규화를 통해 특정 구간을 벗어난 경우를 이상값으로 판별할 수 있다','상자그림, 산점도 등과 같은 시각화를 이용하여 이상값을 검출할 수 있다','상한값과 하한값을 벗어나는 값들을 하한, 상한값으로 변경하여 활용하는 극단값 조정 방법이 있다'],a:0,e:'데이터 측정 중 발생하는 오류로 인해 생성된 값을 이상값으로 정의하여 처리할 수 있다\n(처리할 수 없다는 설명이 틀림)'},
  {s:6,q:'차원 축소의 목적과 특징에 대한 설명으로 올바르지 않은 것은?',o:['차원 축소의 목적은 데이터 분석의 효율성 측면에서 복잡도를 축소하고, 과적합을 방지하며, 해석력을 확보하는 것에 있다','적은 차원만으로도 안정적인 결과를 얻을 수 있다면, 많은 차원을 사용하는 것보다 효율적이다','차원 축소의 기법에는 주성분 분석, 요인 분석, 특이값 분해, 다차원 척도법이 등이 있다','차원이 증가하면서 학습 데이터의 수가 차원의 수보다 커지면 성능이 저하되는 차원의 저주 현상을 해결할 수 있다'],a:3,e:'차원의 저주: 차원이 증가하면서 학습데이터의 수가 차원의 수보다 적어지면서 성능이 저하되는 현상\n(커지면이 아니라 적어지면이 올바른 설명)'},
  {s:6,q:'다음 중 주성분 분석(PCA)에 대한 설명으로 옳지 않은 것은?',o:['분포된 데이터들의 특성을 설명할 수 있는 하나 또는 복수 개의 특징을 찾는 것을 의미한다','변수들의 공분산 행렬이나 상관행렬을 이용한다','음수를 포함하지 않은 두 행렬의 곱으로 분해하는 알고리즘을 적용한다','행의 수와 열의 수가 같은 정방행렬에서만 사용할 수 있다'],a:2,e:'PCA는 데이터를 선형 변환하여 분산이 큰 방향을 찾는 기법으로, 주성분 값에는 음수와 양수 모두 포함될 수 있다\n음수를 포함하지 않는 두 행렬로 분해하는 알고리즘은 비음수 행렬 분해(NMF)'},
  {s:6,q:'다차원척도법(MDS)에 대한 설명으로 옳지 않은 것은?',o:['개체들 사이의 유사성, 비유사성을 2차원 혹은 3차원 공간상에 점으로 표현하여 개체 사이의 군집을 시각적으로 표현하는 분석방법이다','공분산 행렬을 사용하여 고윳값이 1보다 큰 주성분의 개수를 이용한다','스트레스 값이 0에 가까울수록 적합도가 좋다','개체들의 거리는 유클리드(Euclidean) 거리와 유사도를 이용하여 구한다'],a:1,e:'공분산 행렬을 사용하여 고윳값이 1보다 큰 주성분의 개수를 이용하는 것은 주성분 분석(PCA)이다'},
  {s:6,q:'다음 중 스케일링의 방법에 해당하지 않는 것은?',o:['최소-최대 정규화','변수 범주화','로버스트 스케일링','Z-스코어'],a:1,e:'스케일링 종류: 최소-최대 정규화, 로버스트 스케일링, Z-스코어\n변수 범주화는 스케일링이 아닌 변수 변환 방법'},
  {s:6,q:'변수 변환 기법 중 Box-Cox 변환 기법에 대한 설명으로 올바르지 않은 것은?',o:['데이터의 분포가 정규분포를 따르지 않을 때, 정규분포에 근사하도록 데이터를 변환하는 함수 기반의 변환 기법이다','오른쪽 꼬리가 긴 분포를 가진 변수의 왜도를 줄이기 위해 로그 변환을 적용하는 경우도 있다','여러 변수 간의 조합이나 조건을 활용하여 새로운 개념의 변수를 만들어, 분석 모형의 설명력과 성능을 향상시키는 과정이다','비선형적인 분포를 보이는 변수에 제곱근 변환을 적용하면 분포의 왜도가 감소하고, 선형적 특성을 띠게 되어 해석이 쉬워진다'],a:2,e:'Box-Cox 변환: 데이터를 정규분포에 가깝게 만들거나 데이터의 분산을 안정화하는 것\n3번의 설명은 파생변수에 대한 설명'},
  {s:6,q:'불균형 데이터를 분석하는 경우, 고려해야 할 사항으로 올바르지 않은 것은?',o:['데이터에서 각 클래스가 갖고 있는 데이터의 양의 차이가 큰 경우 언더샘플링, 오버샘플링, 앙상블 기법을 통해 불균형 데이터 처리를 수행해야 한다','데이터 클래스 비율이 차이가 나면 단순히 데이터가 큰 클래스를 선택할 가능성이 높아져 정확도가 높아지므로 모형의 검증이 어려워진다','개수가 더 많은 클래스를 더 예측하려고 하기 때문에 정확도는 높아질 수 있지만, 분포가 작은 클래스의 정밀도(Precision)가 급격히 낮아지는 문제가 발생할 수 있다','학습 데이터셋에서는 성능이 높게 나타나지만, 테스트 데이터에서는 예측 성능이 낮아질 수 있다'],a:2,e:'개수가 더 많은 클래스를 더 예측하려고 하기 때문에 정확도는 높아질 수 있지만, 분포가 작은 클래스의 재현율(Recall)이 낮아지는 문제가 발생\n(정밀도가 아닌 재현율이 낮아짐)'},
  {s:6,q:'상관관계에 대한 설명으로 올바른 것은?',o:['상관계수만으로 통계적 유의성을 알 수 있다','두 변수의 값이 함께 감소하는 경향이 있다면, 이는 양의 상관관계로 표현된다','상관계수의 값이 -1에 가까울수록 강한 양의 상관관계를 가진다','상관계수의 절댓값이 클수록 강한 양의 상관관계를 가진다'],a:1,e:'두 변수가 같은 방향(함께 증가 또는 함께 감소)으로 움직이면 양의 상관관계\n상관계수 크기만으로는 통계적 유의성을 알 수 없음\n상관계수가 -1에 가까울수록 강한 음의 상관관계'},
  {s:6,q:'시각적 데이터 탐색을 수행할 때 활용하는 차트 혹은 기법이 아닌 것은?',o:['히스토그램','인코딩','산점도','박스 플롯'],a:1,e:'시각적 데이터 탐색에 사용되는 차트 및 기법: 히스토그램, 산점도, 산점도 행렬, 박스 플롯, 선, 막대 그래프 등\n인코딩(Encoding): 범주형 데이터를 수치형 데이터로 변환하는 것으로 시각적 탐색 기법이 아님'},
  {s:6,q:'비대칭 분포에 대해 왜도의 부호와 평균, 중앙값, 최빈값 비교 결과로 적절한 것은? (오른쪽 꼬리가 긴 분포)',o:['왜도 < 0, 최빈값 < 평균 < 중앙값','왜도 < 0, 평균 < 최빈값 < 중앙값','왜도 > 0, 최빈값 < 중앙값 < 평균','왜도 > 0, 최빈값 < 평균 < 중앙값'],a:2,e:'오른쪽 꼬리가 긴 분포(Positive-Skewed): 왜도 > 0, 최빈값 < 중앙값 < 평균\n왼쪽 꼬리가 긴 분포(Negative-Skewed): 왜도 < 0, 평균 < 중앙값 < 최빈값'},
  {s:6,q:'다음 기초통계량 중 성격이 다른 하나는?',o:['평균값','중앙값','범위','최빈값'],a:2,e:'대푯값으로 사용하는 기초통계량: 평균, 중앙값, 최빈값\n산포에 사용하는 통계량: 범위, 분산, 표준편차\n범위는 산포도 지표로 나머지 셋과 성격이 다름'},
  {s:6,q:'평균에 대한 설명으로 올바르지 않은 것은?',o:['평균은 일반적으로 모든 자료들을 합한 후 전체 자료수로 나누어 계산한다','평균의 종류에는 산술 평균, 기하 평균, 조화 평균이 있다','기하 평균은 N개의 자료에 대해서 관측치를 곱한 후 n제곱근으로 계산한다','평균 물가 상승률, 경제 성장률 등을 구할 때 조화 평균을 활용한다'],a:3,e:'기하 평균: 평균 물가 상승률, 경제 성장률 등을 구할 때 사용\n조화 평균: 평균 속도를 구할 때 사용'},
  {s:6,q:'표본 추출기법의 종류 중 집단 내에서는 서로 이질적이며 집단 간에는 서로 동질적인 표본 추출기법은 무엇인가?',o:['단순 무작위 추출','계통 추출','군집 추출','층화 추출'],a:2,e:'군집 추출법: 집단 내에서는 서로 이질적이며 집단 간에는 서로 동질적인 표본 추출기법\n층화 추출법: 이질적인 모집단에서 각 계층을 고루 대표할 수 있도록 표본을 추출하는 방법'},
  {s:6,q:'모집단에 대하여 표본 추출을 수행할 때 전수조사를 수행해야 하는 것은?',o:['바다에 사는 고래 수','우주선의 부품 검사','환자의 암 진단','전구의 성능 조사'],a:1,e:'우주선 부품 검사: 한 개라도 결함이 있으면 사고로 이어질 수 있으므로 전수조사가 필요\n바다의 고래: 전수조사 불가(표본조사)\n암 진단: 전수조사 어려움\n전구 성능: 파괴성 검사이므로 표본조사'},
  {s:6,q:'어떤 실험에서 X의 평균은 4이고 Y의 평균은 9이며, X와 Y 모두 포아송 분포를 따른다. E((3X+2Y)/6)와 Var((3X+2Y)/6)은 각각?',o:['2, 2','2, 5','5, 2','5, 5'],a:2,e:'포아송 분포: E(X)=Var(X)\nE((3X+2Y)/6) = (1/2)E(X) + (1/3)E(Y) = 4/2 + 9/3 = 2+3 = 5\nVar((3X+2Y)/6) = (1/4)Var(X) + (1/9)Var(Y) = (1/4)×4 + (1/9)×9 = 1+1 = 2'},
  {s:6,q:'표본분포에 대한 설명으로 올바르지 않은 것은?',o:['표본분포는 모집단에서 추출한 일정한 개수의 표본에 대한 분포 상태이다','표본집단의 특성을 나타내는 특성값은 통계량이라고 하며, 이를 통해 모집단의 모수를 추론한다','표본평균의 표준편차를 평균의 표준오차라고 하며, 표본분포의 퍼짐 정도를 나타낸다','모집단의 크기와 관계없이 표본평균의 표준오차는 동일하게 산출한다'],a:3,e:'표본평균의 표준오차: 모집단의 크기가 무한대일 경우 SE=σ/√n\n모집단 크기(N)가 유한할 경우 수정계수를 반영하여 계산 → 모집단 크기에 따라 달라짐'},
  {s:6,q:'모집단과 표본의 통계량에 대한 설명 중 올바르지 않은 것은?',o:['모집단의 분포와 상관없이 표본의 수가 큰 표본평균의 분포는 정규분포를 따른다','표본평균의 분산은 n의 크기와 관계없이 모평균의 분산을 따른다','표본평균의 평균은 모집단의 평균과 동일하다','동일한 모집단의 표준편차에서 표본의 크기가 커지면 커질수록 표준오차는 줄어든다'],a:1,e:'표본평균의 분산은 Var(X̄) ≈ σ²/n으로, n의 크기에 따라 달라짐\n(모평균의 분산을 그대로 따르는 것이 아님)'},
  {s:6,q:'다음 중 점 추정의 조건에 해당하지 않는 것은?',o:['불편성','효율성','일치성','편이성'],a:3,e:'점 추정의 조건: 불편성, 효율성, 일치성\n편이성(편향성)은 점 추정의 조건이 아님'},
  {s:6,q:'가설 검정에 대한 설명으로 올바른 것은?',o:['귀무가설은 연구자가 모수에 대해 새로운 통계적 입증을 이루어 내고자 하는 가설이다','유의수준이 높을수록 연구자는 귀무가설을 기각하고 자신의 주장에 확신을 가질 수 있다','제1종 오류는 귀무가설이 참일 때 귀무가설을 기각하도록 결정하는 오류이다','제2종 오류는 귀무가설이 참일 때 대립가설을 채택하도록 결정하는 오류이다'],a:2,e:'제1종 오류(α error): 귀무가설이 참인데 기각하는 오류\n대립가설은 연구자가 새로운 통계적 입증을 이루어 내고자 하는 가설\n유의확률이 낮을수록 귀무가설을 기각하고 자신의 주장에 확신\n제2종 오류(β error): 귀무가설이 거짓인데 채택하는 오류'},
  {s:6,q:'다수의 이질적인 원소들로 구성된 모집단에서 각 계층을 고루 대표할 수 있도록 표본을 추출하는 방법으로, 이질적인 모집단의 원소들을 서로 유사한 것끼리 몇 개의 층으로 나눈 후 각 계층에서 표본을 랜덤하게 추출하는 기법은?',o:['군집 추출법','단순 무작위 추출법','층화 추출법','계통 추출법'],a:2,e:'층화 추출법: 이질적인 원소들로 구성된 모집단에서 각 계층을 고루 대표할 수 있도록 표본을 추출\n모집단을 서로 겹치지 않는 층들로 나누고 각 층에서 단순확률표본을 추출'},
  {s:6,q:'주성분 분석(PCA) 결과 3개의 주성분을 선택할 때 설명되는 분산의 비율은? (PC1 Cumulative=0.6201, PC2=0.8875, PC3=0.95664)',o:['65.029%','90.523%','95.664%','80.213%'],a:2,e:'PC3의 Cumulative proportion을 확인하면 0.95664 = 95.664%'},
  {s:6,q:'차원 축소의 기법 중 요인 분석에 대한 설명으로 올바르지 않은 것은?',o:['모형을 세운 뒤 관찰 가능한 데이터를 이용하여 해당 잠재 요인을 도출하고 데이터 안의 구조를 해석하는 기법이다','독립 변수와 종속 변수 구분이 없고, 주로 기술통계에 의한 방법을 이용한다','변수를 축소하거나 변수특성을 파악하고, 파생변수를 생성할 때도 활용이 가능하다','영향력이 큰 주요 변수와 유사한 변수를 제거하면서 소수의 요인으로 축약하는 기법이다'],a:3,e:'요인 분석: 유사한 변수들끼리 묶어 주는 방법으로 소수의 요인으로 축약하는 기법\n영향력이 큰 주요 변수가 아니라 유사한 변수들끼리 묶어 소수의 요인으로 축약'},
  // ── 3회 3과목 (s:7) ──
  {s:7,q:'로지스틱 회귀모델에 대한 설명으로 적절하지 않은 것은?',o:['로지스틱 회귀분석은 정규분포를 따른다','로지스틱 회귀분석의 경우, 0~1 사이의 값을 갖는다','로지스틱 회귀분석의 목표변수는 범주형이다','로지스틱 회귀분석의 시그모이드 함수식은 y=1/(1+e^(-x))이다'],a:0,e:'로지스틱 회귀분석: Classification, 이항분포, 종속변수는 범주형, 0~1 사이의 값\n선형 회귀분석: Regression, 정규분포, 종속변수는 연속형'},
  {s:7,q:'선형 회귀분석과 로지스틱 회귀분석에 대한 설명으로 적절하지 않은 것은?',o:['선형 회귀분석은 정규분포를 따르고 로지스틱 회귀분석은 이항분포를 따른다','선형 회귀분석의 종속변수는 연속형이고 로지스틱 회귀분석의 종속변수는 범주형이다','선형 회귀분석은 -∞~∞ 사이의 값을 갖고 로지스틱 회귀분석은 0~1 사이의 값을 갖는다','선형 회귀분석의 결정계수는 파라미터이고 로지스틱 회귀분석의 결정계수는 하이퍼 파라미터이다'],a:3,e:'선형 회귀분석과 로지스틱 회귀분석의 결정계수는 모두 파라미터이다(학습결과 정해지는 값)'},
  {s:7,q:'종속변수가 이산형 변수일 때 의사결정나무의 분류 기준으로 적절하지 않은 것은?',o:['지니 지수','F-통계량','카이제곱 통계량','엔트로피 지수'],a:1,e:'분류나무(이산형 종속변수): 지니지수, 엔트로피 지수, 카이제곱 통계량(p-value)\n회귀나무(연속형 종속변수): F 통계량 p-value, 분산감소량'},
  {s:7,q:'서포트벡터머신(SVM)의 커널 함수로 Radial Basis Function(RBF)을 사용할 때 가장 적절하지 않은 것은?',o:['RBF 커널은 가우시안 커널이라고도 하며, 하이퍼파라미터 C와 gamma를 사용한다','하이퍼 파라미터 gamma 값이 커질수록 과적합 위험이 높아진다','사용자가 지정한 차수의 다항식을 활용하는 커널이다','고차항이 될수록 특성의 중요도는 감소한다'],a:2,e:'사용자가 지정한 차수의 다항식을 활용하는 커널 함수 → Polynomial Kernel\nRBF는 가우시안 함수를 사용하는 커널'},
  {s:7,q:'앙상블 분석에서 이전 모델의 학습결과에 따른 가중치를 데이터에 부여하는 방식이지만 학습속도가 느리고 과대적합이 발생할 수 있는 기법과 그에 해당하는 알고리즘이 알맞게 연결된 것은?',o:['배깅 - Adaboost','배깅 - Random Forest','부스팅 - Random Forest','부스팅 - GBM'],a:3,e:'부스팅: 이전 모델의 결과에 따라 오차에 가중치를 주어 다음 모델을 학습하는 방식, 순차학습, 학습 속도 느림, 과적합 위험 있음. AdaBoost, GBM, XGBoost가 해당\n배깅: 부트스트랩 표본으로 병렬 학습, Random Forest가 대표'},
  {s:7,q:'다음 중 샘플링 데이터의 가중치를 조정하며 모델을 연속적으로 학습하여 오차를 줄이는 방법은?',o:['배깅(bagging)','스태킹(stacking)','부스팅(boosting)','랜덤포레스트(random forest)'],a:2,e:'부스팅(Boosting): 여러 모델이 순차적으로 학습\n이전 모델의 결과에 따라 분류가 잘못된 데이터에 가중치(weight)를 부여하여 표본을 추출함'},
  {s:7,q:'다중공선성에 대한 대책으로 적절하지 않은 것은?',o:['비즈니스 중요도와 상관없이 상관관계가 높은 변수는 제거한다','주성분 분석을 통해 변수를 요약한 주성분을 변수로 활용한다','라쏘(Lasso), 릿지(Ridge)와 같은 정규화 모델로 어느 정도 방지할 수 있다','데이터를 추가 수집하여 변수를 변형시키거나 새로운 관측치를 이용한다'],a:0,e:'비즈니스 중요도를 고려하여 상관관계가 높은 변수를 제거해야 한다\n비즈니스 중요도를 고려하지 않으면 중요한 변수가 제외될 수 있음'},
  {s:7,q:'다음 중 활성화 함수에 대한 설명으로 적절하지 않은 것은?',o:['하이퍼볼릭탄젠트(tanh) 함수는 -1에서 1 사이의 값을 출력한다','ReLU는 상대적으로 가중치 업데이트 속도가 빠르다','비선형 함수를 사용해야 다수의 은닉층을 추가할 수 있다','시그모이드(sigmoid) 함수는 0에서 가장 작은 미분값을 갖는다'],a:3,e:'시그모이드(sigmoid) 함수는 0에서 가장 큰 미분값 0.25를 갖는다\n(가장 작은 미분값이 아니라 가장 큰 미분값)'},
  {s:7,q:'활성화 함수 중 하나인 소프트맥스(softmax)에 대한 설명으로 적절하지 않은 것은?',o:['세 개 이상의 다중 클래스 분류에 사용되는 활성화 함수이다','각 클래스에 속할 확률이 아닌 클래스 값을 추정한다','지수 함수를 적용하여 작은 값 차이도 구별 가능한 차이로 커진다','시그모이드 함수와 같이 출력층에서 주로 사용한다'],a:1,e:'소프트맥스(softmax): 각 클래스에 속할 확률값을 출력함\n클래스 값이 아닌 각 클래스에 속할 확률을 추정'},
  {s:7,q:'보기의 각 과제에 대하여 분석 방법이 적절하게 연결된 것은? (가: 영화 감상평 긍정/부정 판단, 나: 얼굴 인식 보안게이트, 다: 이미지+설명 제공 앱, 라: 공장 로봇 운동능력 훈련)',o:['가: 순환신경망, 나: 강화학습, 다: 합성곱신경망, 라: 순환+합성곱신경망','가: 순환신경망, 나: 합성곱신경망, 다: 순환+합성곱신경망, 라: 강화학습','가: 합성곱신경망, 나: 순환신경망, 다: 강화학습, 라: 순환+합성곱신경망','가: 합성곱신경망, 나: 순환+합성곱신경망, 다: 순환신경망, 라: 강화학습'],a:1,e:'가: 자연어(감상평) → RNN(순환신경망)\n나: 이미지(얼굴인식) → CNN(합성곱신경망)\n다: 이미지+자연어 설명 → RNN+CNN\n라: 행동에 대해 적절한 대응 → 강화학습'},
  {s:7,q:'다음 중 심층신경망(DNN)에 대한 설명으로 적절하지 않은 것은?',o:['심층신경망은 입력층과 출력층 사이에 여러 개의 은닉층들로 이뤄진 인공신경망이다','심층신경망은 활성화 함수로 비선형 함수를 사용한다','심층신경망의 가중치(weight) 파라미터는 경사하강법을 통하여 갱신될 수 있다','불균형 데이터를 사용할 경우 클래스가 적은 데이터에 작은 loss를 갖도록 하여 불균형 문제를 해결할 수 있다'],a:3,e:'클래스 불균형 해결: 클래스가 적은 데이터에 더 큰 loss를 계산해주는 것(weight balancing)\n클래스 비율이 1:9라면 가중치를 9:1로 주어 전체 클래스의 loss에 동일하게 기여하도록 함'},
  {s:7,q:'과일 판매 데이터가 {오렌지,사과,딸기}, {오렌지,사과,자몽}, {오렌지,바나나}, {사과,바나나,딸기}, {오렌지,사과,바나나,자몽}일 때 {오렌지,사과 → 자몽}의 신뢰도와 지지도는?',o:['신뢰도=33.3%, 지지도=40%','신뢰도=33.3%, 지지도=60%','신뢰도=66.6%, 지지도=40%','신뢰도=66.6%, 지지도=60%'],a:2,e:'P(오렌지,사과) = 3/5, P(오렌지,사과,자몽) = 2/5\n신뢰도 = 0.4/0.6 = 66.6%\n지지도 = 2/5 = 40%'},
  {s:7,q:'각 범주에 대한 관측 빈도가 아래와 같을 때 카이제곱 통계량을 적절하게 계산한 것은? (여성-심장병 있음:200, 없음:350, 합계:550 / 남성-심장병 있음:400, 없음:50, 합계:450 / 합계:600, 400, 1000)',o:['(200-330)²/330 + (400-270)²/270 + (350-220)²/220 + (50-180)²/180','(200-270)²/270 + (400-330)²/330 + (350-180)²/180 + (50-220)²/220','(200-330)²/1000 + (400-270)²/1000 + (350-220)²/1000 + (50-180)²/1000','(200-270)²/1000 + (400-330)²/1000 + (350-180)²/1000 + (50-220)²/1000'],a:0,e:'기대도수: 여성-있음: (600×550)/1000=330, 남성-있음: (600×450)/1000=270, 여성-없음: (400×550)/1000=220, 남성-없음: (400×450)/1000=180\nχ² = Σ(O-E)²/E'},
  {s:7,q:'약의 효과를 확인하기 위해 약 복용 전후를 비교하는 비모수 검정 방법으로 적절한 것은?',o:['윌콕슨 순위합 검정(Wilcoxon rank sum test)','크루스칼-왈리스 검정(Kruskal-Wallis test)','윌콕슨 부호순위 검정(Wilcoxon signed rank test)','대응표본 t-검정(Paired t-test)'],a:2,e:'약 효과 확인을 위해 전후를 비교하기 위해서는 2개 대응 자료를 사용\n2개 대응 자료에 대한 비모수 서열척도의 검정은 Wilcoxon signed rank test'},
  {s:7,q:'비모수적 추론에 대한 설명으로 가장 적절하지 않은 것은?',o:['모집단의 분포에 대한 가정을 필요로 하지 않는다','데이터가 연속형 측정값인 경우에만 사용할 수 있다','순위와 부호를 기반으로 하여 이상치의 영향을 받지 않는다','데이터 샘플의 크기가 매우 작은 경우에도 사용할 수 있다'],a:1,e:'비모수적 추론: 모집단의 분포에 대해 제약을 가하지 않고 검정을 실시하는 방법\n범주형(명목척도, 서열척도)인 경우 사용할 수 있음 → 연속형에만 사용하는 것이 아님'},
  {s:7,q:'비모수적 통계 분석기법인 Wilcoxon Signed Rank test와 Wilcoxon Rank Sum test 관련 설명으로 가장 옳지 않은 것은?',o:['Wilcoxon Signed Rank test는 일변량 및 이변량 검정이 있다','Wilcoxon Rank Sum은 이변량 검정이다','주로 데이터의 수가 30개 이하인 경우 사용한다','Wilcoxon Signed Rank test는 Two Sample t test에 대응하는 비모수 검정이다'],a:3,e:'Wilcoxon Signed Rank test의 이변량 검정은 Paired t test에 대응하는 비모수 검정\nWilcoxon Rank Sum test가 Two Sample t test에 대응하는 비모수 검정'},
  {s:7,q:'시계열 분해 요인이 아닌 것은?',o:['추세요인','공통요인','계절요인','순환요인'],a:1,e:'시계열 분해 요인: 추세요인, 계절요인, 순환요인, 불규칙요인\n공통요인은 시계열 분해 요인이 아님'},
  {s:7,q:'비정상 시계열에 대한 시계열 모델로 ARIMA에 대한 설명으로 적절하지 않은 것은?',o:['차수가 p, d, q인 모델은 ARIMA(p, d, q)로 나타낸다','차수 d가 0인 경우 ARMA(p, q) 모델을 사용한 것과 동일하다','AR은 자기회귀 모델을 나타내고 MA는 이동평균 모델을 나타낸다','비정상 시계열을 안정적으로 정상화하기 위해 차수 d는 되도록 크게 설정해야 한다'],a:3,e:'비정상 시계열을 정상화하기 위한 적절한 차수 d를 식별해야 한다\nACF와 PACF 그래프를 분석해 p, d, q 차수를 식별 → d를 크게 설정하는 것이 아님'},
  {s:7,q:'다음 중 시계열 분석과 관련 없는 것은?',o:['백색 잡음','이항 분포','자기 회귀','이동 평균'],a:1,e:'자기 회귀(AR): 현 시점의 자료를 과거 값을 사용하여 설명\n이동 평균(MA): 과거 오차들에서 현재항의 상태를 추론\n백색 잡음(Noise): 자기상관이 전혀 없는 특별한 경우\n이항 분포는 시계열 분석과 관련 없음'},
  {s:7,q:'( A )는 시계열의 시차 값(lagged values) 사이의 선형관계를 나타냄. A는 무엇인가?',o:['자기상관','지수평활법','이동평균법','백색잡음'],a:0,e:'자기상관: 시계열의 시차값 사이의 상관관계(선형)관계를 나타냄\n부분자기상관: 시차가 다른 두 시계열 데이터 간의 상관관계'},
  {s:7,q:'사회관계망분석(Social Network Analysis)에서 중심성 분석으로 적절하지 않은 것은?',o:['근접중심성','매개중심성','포괄중심성','아이겐벡터중심성'],a:2,e:'SNA에서의 중심성 분석 종류: 연결 정도(degree) 중심성, 근접(closeness) 중심성, 매개(betweenness) 중심성, 위세(eigenvector) 중심성\n포괄중심성은 없음'},
  // ── 3회 4과목 (s:8) ──
  {s:8,q:'다음 중 평균 절대 백분율 오차(MAPE)의 수식으로 적절한 것은?',o:['(100%/n) × Σ|(y_i - ŷ_i)/y_i|','Σ(y_i - ŷ_i)² / n','Σ(log(ŷ_i+1) - log(y_i+1))² / n','Σ|y_i - ŷ_i| / n'],a:0,e:'MAPE(Mean Absolute Percentage Error): 에러의 백분율을 구한 것\n= (100%/n) × Σ|(y_i - ŷ_i)/y_i|\n2번: MSE, 3번: MSLE, 4번: MAE'},
  {s:8,q:'회귀분석 결과의 분산분석표에서 결정계수에 대한 설명으로 옳지 않은 것은? (가=SSR=21186, 나=SSE=11354)',o:['결정계수는 회귀모형의 설명력을 나타내는 지표로 (가)를 (나)로 나누어 구한다','F통계량은 주어진 표의 값들로 직접 계산할 수 있다','Pr(>F)는 F통계량보다 크거나 같은 값을 가질 확률을 의미한다','일반적으로 Pr(>F)의 값이 0.05보다 작으면 귀무가설을 기각하므로 회귀모형은 유의하다'],a:0,e:'결정계수는 (가)+(나)를 (가)로 나누어 구한다 (SSR/SST)\n(나)로 (가)를 나누는 것이 아님'},
  {s:8,q:'이진분류를 수행할 때의 평가지표로 적절하지 않은 것은?',o:['정확도','재현율','MSE','AUC'],a:2,e:'분류모형 평가지표: 정확도, 정밀도, 재현율, AUC, F1-Score, 오분류율, FP Rate 등\n회귀모형 평가지표: MAE, MSE, MSLE, RMSE, RMSLE, MAPE, 결정계수(R²)\nMSE는 회귀모형 평가지표'},
  {s:8,q:'분류 모델에 대한 모니터링 평가지표로 적절하지 않은 것은?',o:['오분류표','정밀도','RMSE','F1-Score'],a:2,e:'분류모형 평가지표: 정확도, 정밀도, 재현율, AUC, F1-Score, 오분류율, FP Rate 등\n회귀모형 평가지표: MAE, MSE, MSLE, RMSE, RMSLE, MAPE, 결정계수(R²)\nRMSE는 회귀모형 평가지표'},
  {s:8,q:'다음 오분류표에서 구한 재현율(Recall)과 정밀도(Precision)로 적절한 것은? (0은 Negative, 1은 Positive / 실제0 예측0:90, 예측1:40 / 실제1 예측0:10, 예측1:60)',o:['재현율 : 3/4, 정밀도 : 3/5','재현율 : 6/7, 정밀도 : 3/5','재현율 : 3/4, 정밀도 : 4/9','재현율 : 6/7, 정밀도 : 4/9'],a:1,e:'재현율(Recall) = TP/(TP+FN) = 60/70 = 6/7\n정밀도(Precision) = TP/(TP+FP) = 60/100 = 3/5'},
  {s:8,q:'질병 검사 결과 실제 음성(False)을 음성(False)으로 정확히 예측하는지에 대한 평가지표로 적절한 것은?',o:['정확도','특이도','정밀도','민감도'],a:1,e:'특이도(Specificity) = TN/(TN+FP): 실제 False인 것 중 맞춘 것의 비율\n민감도(Recall) = TP/(TP+FN): 실제 True에서 맞춘 것의 비율'},
  {s:8,q:'다음 중 ROC Curve에 대한 설명으로 옳지 않은 것은?',o:['AUC(Area Under Curve)는 곡선의 아래 면적을 의미한다','그래프의 중간선과 곡선이 동일할 때 가장 우수한 성능이다','ROC Curve의 AUC가 클 수록 좋은 성능의 모형이라 할 수 있다','ROC Curve는 분류분석 성능 평가를 위한 도구이다'],a:1,e:'ROC Curve가 대각선(중간선)과 동일하면 AUC=0.5로 랜덤 분류기와 같은 성능\n가장 이상적인 ROC Curve는 AUC=1에 가까운 것'},
  {s:8,q:'하이퍼 파라미터에 대한 설명으로 적절하지 않은 것은?',o:['모델의 외부 요소로 사용자가 직접 설정한다','모델 성능을 개선하기 위해 사용하며, 파라미터 값에 영향을 준다','그리드 서치, 랜덤 서치 등의 튜닝 방법이 있다','데이터 학습 결과로 자동 결정된다'],a:3,e:'데이터 학습 결과로 결정되는 것은 파라미터(parameter)\n하이퍼파라미터는 학습 전에 사용자가 직접 설정하는 값'},
  {s:8,q:'다음 중 관계시각화에 대한 설명으로 올바른 것은?',o:['연속형 데이터의 분포를 시각적으로 표현하는 시각화 방법이다','집단 간 상관관계를 확인하여 다른 수치의 변화 예측에 사용되는 시각화 방법이다','지도를 통해 시점에 따른 경향, 차이 등을 확인할 수 있는 시각화 방법이다','전체에 대한 범주 별 비율을 표시하는 시각화 방법이다'],a:1,e:'관계 시각화: 다변량 데이터에 대하여 변수 간의 연관성 및 패턴을 색상, 농도 등을 사용하여 표현·분석함\n1번: 분포 시각화, 3번: 공간 시각화, 4번: 구성 시각화'},
  {s:8,q:'다음 중 산점도(Scatter plot)와 비슷한 시각화 방법은?',o:['버블 차트','파이 차트','트리 맵','히트맵'],a:0,e:'버블 차트: 산점도와 비슷한 시각화 방법, 데이터의 크기, 범주를 버블의 크기, 색상으로 나타냄'},
  {s:8,q:'아래에서 설명하는 검증방법으로 적절한 것은? (7:3 또는 8:2의 비율로 학습데이터와 테스트데이터로 분할, 랜덤추출 방법을 활용하여 데이터가 편향되지 않도록 함)',o:['홀드 아웃','K-Fold 교차검증','부트스트랩','드롭아웃'],a:0,e:'홀드 아웃(Hold-Out): 학습 데이터와 테스트 데이터를 2개 또는 3개로 분리, 랜덤 추출 방법을 활용\nK-Fold: K개로 분리해 K-1개는 학습용, 1개는 테스트용\n드롭아웃: 딥러닝에서 과대적합을 방지하기 위해 사용하는 기법'},
  {s:8,q:'특정 지역의 데이터 값을 표현하기 위해 지리적 형상 크기를 조절하여 지도의 면적이 왜곡되는 시각화 방법은 무엇인가?',o:['도트 플롯','카토그램','등치선도','버블 플롯'],a:1,e:'카토그램: 데이터 값의 변화에 따라 지도의 면적이 왜곡되는 지도\n등치선도: 지도 상에서 같은 값을 가지는 점을 선으로 이은 것'},
  {s:8,q:'다음 중 여러 개의 수치형 변수에 대해 각각 축을 두고, 중앙으로부터의 거리로 값을 나타내어 비교 분석이 가능한 차트는?',o:['버블 차트','스타 차트','히트맵','히스토그램'],a:1,e:'스타 차트: 측정 목표에 대한 평가항목이 다수일 때 사용, 변수의 수만큼 축을 그리고 각 축에 측정값 표시, 항목간 비율 및 균형, 경향을 알 수 있음'},
  {s:8,q:'다음 보기에서 설명하는 시각화 분석으로 적절한 것은? (다변량 데이터에 대하여 변수 간의 연관성 및 패턴을 분석한다, 버블차트·밀도차트 등을 활용한다)',o:['시간 시각화','관계 시각화','비교 시각화','공간 시각화'],a:1,e:'관계 시각화: 다변량 데이터에 대하여 변수 간의 연관성 및 패턴을 색상, 농도 등을 사용하여 표현·분석함'},
  {s:8,q:'회귀분석 모형의 적합성을 평가할 때 가장 적절하지 않은 것은?',o:['잔차는 서로 상관성이 없고 동일한 분산을 가져야 한다','잔차의 정규성 검정을 위해 Q-Q plot을 활용할 수 있다','회귀계수 추정값이 0이어도 y절편 추정값이 0이 아니면 모형은 유의하다','결정계수 값이 1에 가까울수록 모형의 설명력이 높다'],a:2,e:'회귀계수가 0이면 해당 변수는 종속변수 y와 선형적 관계가 없고, 모형은 통계적으로 유의하지 않음\ny절편 추정값과 관계없이 회귀계수가 0이면 모형은 유의하지 않음'},
  {s:8,q:'신경망의 과적합을 방지하는 방법으로 적절하지 않은 것은?',o:['일반적인 패턴을 학습할 수 있도록 데이터를 추가 수집한다','모델의 복잡도를 줄이기 위해 은닉층이나 은닉노드 수를 늘린다','학습 과정에서 일부 노드를 사용하지 않는 드롭아웃 기법을 활용한다','L1 규제, L2 규제와 같은 가중치 규제를 적용하여 모델의 복잡도를 줄인다'],a:1,e:'모델의 복잡도를 줄이기 위해 은닉층이나 은닉노드 수를 줄인다\n(늘리는 것이 아니라 줄이는 것이 과적합 방지 방법)'},
  {s:8,q:'다음 중 경사하강법이 아닌 것은?',o:['AdaBoost','AdaGrad','RMSProp','Adam'],a:0,e:'AdaBoost는 머신러닝의 앙상블 기법 중 Boosting의 한 가지 종류\n경사하강법 Optimizer: AdaGrad, AdaDelta, RMSProp, Adam, Nadam, Momentum, NAG'},
  {s:8,q:'모수 검정에 대한 설명으로 옳은 것은?',o:['모집단의 분포에 대한 가정을 하지 않고 순위를 활용한다','모집단이 정규분포를 따른다고 가정하며, 표본평균과 표준편차 등 모수를 활용하여 집단 간 차이를 검증한다','표본의 수가 반드시 30개 이상일 때만 사용할 수 있다','변수의 척도가 명목척도나 서열척도인 경우에 적합하다'],a:1,e:'모수 검정: 모집단이 정규분포를 따른다고 가정하고, 표본평균과 표준편차 등 모수를 이용하여 집단 간 차이를 검증\n모집단 분포에 대한 가정 없이 순위를 활용하는 것은 비모수 검정'},
  {s:8,q:'다음 설명에 해당하는 방법은? (세 개 이상의 집단 평균 차이를 비교하기 위해 사용되는 방법으로, 집단 간 변동과 집단 내 변동을 분석하여 평균 차이가 통계적으로 유의한지 검정한다.)',o:['콜모고로프-스미르노프 검정','샤피로-윌크 검정','카이제곱 적합도 검정','분산분석(ANOVA)'],a:3,e:'분산분석(ANOVA): 세 집단 이상의 평균 차이를 비교하기 위해 사용하는 방법\n집단 간 변동과 집단 내 변동의 비율을 통해 평균 차이의 유의성을 판단'},
  {s:8,q:'과소적합에 대한 설명 중 빈 칸에 들어갈 말로 옳은 것은? (모형이 과소적합 상태일 경우, 훈련 성능은 ㉠, 평가 성능은 ㉡)',o:['㉠: 낮고, ㉡: 높다','㉠: 높고, ㉡: 높다','㉠: 낮고, ㉡: 낮다','㉠: 높고, ㉡: 낮다'],a:2,e:'과소적합: 모델이 지나치게 단순하여 훈련 데이터를 충분히 학습하지 못하는 상태\n편향이 높아 훈련 성능이 낮고, 분산이 낮아 평가 성능도 낮게 나타남'},
  {s:8,q:'빅데이터 비즈니스의 주요 실패 요인에 해당하지 않는 것은?',o:['분석 모델을 정의하기 전에 반드시 인프라를 먼저 구축해야 한다','빅데이터 분석 및 서비스 추진에 있어 목적과 방향성이 불분명하다','분석에 활용되는 데이터의 품질이 낮다','빅데이터 분석 결과를 활용할 주체가 명확하지 않다'],a:0,e:'빅데이터 비즈니스에서 인프라는 분석 모델을 정의한 이후에 구축해야 한다\n모델 정의 없이 인프라를 먼저 도입하면 분석 목적과 데이터 특성에 맞지 않는 인프라가 구축될 수 있음'},
];

// ── App State ──
let currentUser = null;
let answered = Array(Q.length).fill(null);  // 원래 답안
let retryAnswered = {};                      // 오답노트 재풀기 답안
let currentTab = 0;

// ── Password ──
const SAVE_KEY = 'bq-ans:quiz3';
async function checkPw() {
  const v = document.getElementById('pw-input').value;
  if (v === 'eduatoz2014') {
    document.getElementById('pw-screen').classList.add('hidden');
    const saved = await Store.get(SAVE_KEY);
    if (saved) {
      const savedAns = saved.answered || [];
      for (let i=0; i<Q.length; i++) { answered[i] = savedAns[i] !== undefined ? savedAns[i] : null; }
      retryAnswered = saved.retryAnswered || {};
    }
    currentUser = 'quiz3';
    refresh();
  } else {
    shake('pw-input'); document.getElementById('pw-error').textContent='비밀번호가 올바르지 않습니다.';
    document.getElementById('pw-input').value='';
  }
}
document.getElementById('pw-input').addEventListener('keydown',e=>{ if(e.key==='Enter') checkPw(); });
document.getElementById('pw-input').focus();

async function logout() {
  currentUser=null; answered=new Array(Q.length).fill(null); retryAnswered={}; currentTab=0;
  document.getElementById('pw-input').value=''; document.getElementById('pw-error').textContent='';
  document.getElementById('pw-screen').classList.remove('hidden');
  setTimeout(()=>document.getElementById('pw-input').focus(),100);
}

async function save() {
  if (!currentUser) return;
  await Store.set(SAVE_KEY, { answered, retryAnswered, ts: Date.now() });
  const t=document.getElementById('toast'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800);
}

function shake(id) {
  const el=document.getElementById(id); el.classList.add('shake');
  setTimeout(()=>el.classList.remove('shake'),400);
}

// ── Helpers ──
function sqs(s) { return Q.map((q,i)=>({...q,idx:i})).filter(q=>q.s===s); }
function sqsByTab(tab) {
  const sMap = {0:5,1:6,2:7,3:8};
  return Q.map((q,i)=>({...q,idx:i})).filter(q=>q.s===sMap[tab]);
}
function score(tab) {
  const qs=sqsByTab(tab);
  return { correct:qs.filter(q=>answered[q.idx]===q.a).length, answered:qs.filter(q=>answered[q.idx]!==null).length, total:qs.length };
}
function wrongQs(exam) {
  const sRange = exam===2 ? [0,1,2,3] : [5,6,7,8];
  return Q.map((q,i)=>({...q,idx:i})).filter(q=>sRange.includes(q.s) && answered[q.idx]!==null && answered[q.idx]!==q.a);
}
function wrongScore(exam) {
  const wq=wrongQs(exam);
  return { correct:wq.filter(q=>retryAnswered[q.idx]===q.a).length, answered:wq.filter(q=>retryAnswered[q.idx]!==undefined).length, total:wq.length };
}
// ── Render ──
function renderTabs() {
  const wq=wrongQs(), wsc=wrongScore();
  document.getElementById('tabBar').innerHTML = SUBJECTS.map((s,i)=>{
    let sc;
    if (i<4) { const c=score(i); sc=`${c.correct}/${c.total}`; }
    else sc = wq.length===0 ? '없음' : `${wsc.correct}/${wsc.total}`;
    return `<button class="tab-btn ${s.cc} ${currentTab===i?'active':''}" onclick="switchTab(${i})">
      <span>${s.emoji} ${s.label}</span><span class="tab-score">${sc}</span>
    </button>`;
  }).join('');
}

function card(q, qi, isRetry) {
  const ans = isRetry ? retryAnswered[q.idx] : answered[q.idx];
  const done = ans!==null && ans!==undefined;
  const ok = ans===q.a;
  const colors=['#f5c842','#2ee8c4','#b48bff','#ff4f72'];
  const snames=['1과목','2과목','3과목','4과목'];

  const tag = isRetry ? `<span class="q-origin-tag" style="background:${colors[q.s]}18;color:${colors[q.s]};border:1px solid ${colors[q.s]}44">${snames[q.s]}</span>` : '';

  const opts = q.o.map((opt,oi)=>{
    let cls='opt-btn';
    if(done){ if(oi===q.a) cls+=' show-correct'; if(oi===ans&&ans!==q.a) cls+=' selected-wrong'; if(oi===ans&&ans===q.a) cls='opt-btn selected-correct'; }
    const fn = isRetry ? `doRetry(${q.idx},${oi})` : `doAnswer(${q.idx},${oi})`;
    return `<button class="${cls}" ${done?'disabled':''} onclick="${fn}">
      <span class="opt-num">${oi+1}</span><span>${opt}</span>
    </button>`;
  }).join('');

  const result = done ? `<div class="result-row">
    <span>${ok?'✅':'❌'}</span>
    <span class="${ok?'result-ok':'result-ng'}">${ok?'정답입니다!':'오답 — 정답: '+(q.a+1)+'번'}</span>
  </div>
  <div class="explanation ${ok?'correct-exp':'wrong-exp'}">${q.e}</div>` : '';

  return `<div class="q-card${done?(ok?' correct':' wrong'):''}">
    <div class="q-num">Q${qi+1} ${tag}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">${opts}</div>${result}
  </div>`;
}

function renderSubject(tab) {
  const qs=sqsByTab(tab), sc=score(tab), prog=sc.total?sc.answered/sc.total*100:0;
  const colorArr=['#f5c842','#2ee8c4','#b48bff','#ff4f72','#f97316','#f5c842','#2ee8c4','#b48bff','#ff4f72','#f97316'];
  const color=colorArr[tab]||'#2ee8c4';
  return `<div class="subject-panel active">
    <div class="subject-header">
      <div class="subject-title">${SUBJECTS[tab].emoji} ${SUBJECTS[tab].label} — ${SUBJECTS[tab].name}</div>
      <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
        <div class="score-badge" style="color:${color}">✅ ${sc.correct} / ${sc.total} 문항</div>
        <button class="reset-btn" onclick="resetSub(${tab})">초기화</button>
      </div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" style="width:${prog}%"></div></div>
    ${qs.map((q,qi)=>card(q,qi,false)).join('')}
  </div>`;
}

function renderWrong(exam) {
  const wq=wrongQs(exam), wsc=wrongScore(exam);
  const label = exam===2 ? '2회' : '3회';
  if (!wq.length) return `<div class="subject-panel active"><div class="wrong-empty"><div class="big">🎉</div><div>아직 틀린 문제가 없습니다!</div><div style="font-size:0.73rem;margin-top:0.3rem">${label} 1~4과목 문제를 풀면 틀린 문제가 여기 모입니다.</div></div></div>`;
  const prog=wsc.total?wsc.answered/wsc.total*100:0;
  return `<div class="subject-panel active">
    <div class="subject-header">
      <div class="subject-title">❌ ${label} 오답노트 — 틀린 문제 다시 풀기</div>
      <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
        <div class="score-badge" style="color:#f97316">🔁 ${wsc.correct} / ${wsc.total} 재도전</div>
        <button class="reset-btn" onclick="resetRetry(${exam})">재풀기 초기화</button>
      </div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" style="width:${prog}%;background:linear-gradient(90deg,#f97316,#ff4f72)"></div></div>
    ${wq.map((q,qi)=>card(q,qi,true)).join('')}
  </div>`;
}

function refresh() {
  renderTabs();
  let html;
  if (currentTab===4) html = renderWrong(3);
  else if (currentTab===9) html = renderWrong(3);
  else html = renderSubject(currentTab);
  document.getElementById('mainContent').innerHTML = html;
}

// ── Actions ──
async function doAnswer(idx,sel) {
  if(answered[idx]!==null) return;
  answered[idx]=sel; await save(); refresh();
}
async function doRetry(idx,sel) {
  if(retryAnswered[idx]!==undefined) return;
  retryAnswered[idx]=sel; await save(); refresh();
}
async function resetSub(tab) {
  sqsByTab(tab).forEach(q=>{ answered[q.idx]=null; delete retryAnswered[q.idx]; });
  await save(); refresh();
}
async function resetRetry(exam) {
  const sRange = exam===2 ? [0,1,2,3] : [5,6,7,8];
  Q.forEach((q,i)=>{ if(sRange.includes(q.s)) delete retryAnswered[i]; });
  await save(); refresh();
}
function switchTab(t) { currentTab=t; refresh(); }
</script>
</body>
</html>
