<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데이터 분석 지식 그래프</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#07090f; color:#dde3f5; font-family:'Noto Sans KR',sans-serif; height:100vh; overflow:hidden; display:flex; flex-direction:column; user-select:none; }

/* ── Header ── */
#header { background:#0c1020; border-bottom:1px solid rgba(255,255,255,0.07); padding:10px 18px; display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; flex-shrink:0; }
#header h1 { font-size:1rem; font-weight:900; background:linear-gradient(90deg,#5eead4,#818cf8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; white-space:nowrap; }
#header p  { font-size:.6rem; color:#4a5580; margin-top:2px; }

/* ── Legends ── */
.legends { display:flex; gap:14px; flex-wrap:wrap; align-items:flex-start; }
.leg-block { display:flex; flex-direction:column; gap:3px; }
.leg-title { font-size:.55rem; color:#4a5580; text-transform:uppercase; letter-spacing:.1em; }
.leg-items { display:flex; gap:5px; flex-wrap:wrap; }
.leg-btn { display:flex; align-items:center; gap:4px; font-size:.62rem; padding:2px 8px; border-radius:10px; border:1px solid transparent; cursor:pointer; transition:all .15s; background:none; color:#4a5580; font-family:'Noto Sans KR',sans-serif; }
.leg-btn.on { border-color:rgba(255,255,255,.14); background:rgba(255,255,255,.04); color:#dde3f5; }
.leg-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; display:inline-block; }
.leg-line { width:18px; height:2px; border-radius:2px; flex-shrink:0; display:inline-block; }

/* ── Graph area ── */
#graph { flex:1; position:relative; overflow:hidden; }
#canvas { display:block; width:100%; height:100%; cursor:grab; }
#canvas.grabbing { cursor:grabbing; }

/* ── Search ── */
#search-wrap { position:absolute; top:10px; left:50%; transform:translateX(-50%); z-index:20; }
#search { background:rgba(6,10,22,.95); border:1px solid rgba(255,255,255,.1); border-radius:16px; padding:5px 14px; color:#dde3f5; font-family:'Noto Sans KR',sans-serif; font-size:.72rem; width:190px; outline:none; }
#search:focus { border-color:rgba(255,255,255,.28); }
#search::placeholder { color:#4a5580; }

/* ── Controls ── */
#controls { position:absolute; bottom:14px; left:14px; display:flex; flex-direction:column; gap:5px; z-index:20; }
.ctrl { width:28px; height:28px; background:rgba(10,14,28,.92); border:1px solid rgba(255,255,255,.1); border-radius:6px; color:#dde3f5; font-size:.9rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.ctrl:hover { background:rgba(255,255,255,.08); }

/* ── Detail panel ── */
#panel { position:absolute; top:14px; right:14px; width:268px; background:rgba(6,10,22,.97); border:1px solid rgba(255,255,255,.1); border-radius:13px; padding:15px 17px 17px; z-index:30; box-shadow:0 16px 50px rgba(0,0,0,.85); display:none; }
#panel.show { display:block; }
#p-close { position:absolute; top:9px; right:11px; background:rgba(255,255,255,.06); border:none; border-radius:50%; width:22px; height:22px; color:#4a5580; font-size:.72rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
#p-close:hover { background:rgba(255,255,255,.13); color:#dde3f5; }
#p-cat  { font-size:.57rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; margin-bottom:4px; }
#p-name { font-size:1rem; font-weight:900; margin-bottom:7px; line-height:1.3; }
#p-desc { font-size:.7rem; color:#8892bb; line-height:1.75; margin-bottom:11px; }
#p-sec  { font-size:.57rem; color:#4a5580; text-transform:uppercase; letter-spacing:.1em; margin-bottom:5px; }
#p-rels { display:flex; flex-direction:column; gap:4px; max-height:190px; overflow-y:auto; }
.p-rel  { display:flex; align-items:center; gap:7px; font-size:.67rem; padding:5px 9px; border-radius:7px; background:rgba(255,255,255,.04); border-left:3px solid #444; cursor:pointer; transition:background .12s; }
.p-rel:hover { background:rgba(255,255,255,.09); }
.p-rel-type { font-size:.57rem; opacity:.6; font-style:italic; min-width:44px; flex-shrink:0; }
</style>
</head>
<body>

<div id="header">
  <div>
    <h1>데이터 분석 지식 그래프</h1>
    <p>노드 클릭 → 상세정보 & 연결관계 표시 &nbsp;|&nbsp; 드래그로 이동 &nbsp;|&nbsp; 스크롤로 확대/축소</p>
  </div>
  <div class="legends">
    <div class="leg-block">
      <div class="leg-title">카테고리</div>
      <div class="leg-items" id="cat-legend"></div>
    </div>
    <div class="leg-block">
      <div class="leg-title">관계 유형</div>
      <div class="leg-items" id="rel-legend"></div>
    </div>
  </div>
</div>

<div id="graph">
  <div id="search-wrap">
    <input id="search" placeholder="🔍 노드 검색..." />
  </div>
  <canvas id="canvas"></canvas>
  <div id="controls">
    <button class="ctrl" id="btn-zi">＋</button>
    <button class="ctrl" id="btn-zo">－</button>
    <button class="ctrl" id="btn-zr">⊙</button>
  </div>
  <div id="panel">
    <button id="p-close">✕</button>
    <div id="p-cat"></div>
    <div id="p-name"></div>
    <div id="p-desc"></div>
    <div id="p-sec">연결된 개념</div>
    <div id="p-rels"></div>
  </div>
</div>

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
const nodeById = {};
NODES.forEach(n => nodeById[n.id] = n);

// Working copies with physics state
const nodes = NODES.map(n => ({ ...n, x:0, y:0, vx:0, vy:0 }));
const nodeIndex = {};
nodes.forEach((n,i) => nodeIndex[n.id] = i);

// Edge working copies (resolved to node objects)
const edges = EDGES.map(e => ({
  ...e,
  source: null, target: null  // filled after nodes ready
}));
edges.forEach(e => {
  e.source = nodes[nodeIndex[e.s]];
  e.target = nodes[nodeIndex[e.t]];
});

// Camera
let camX = 0, camY = 0, camK = 0.82;

// Interaction
let selectedId  = null;
let highlightIds = null;   // Set of node ids to highlight
let highlightEdgeIdx = null; // Set of edge indices

let hiddenCats = new Set();
let hiddenRels = new Set();
let searchQ    = '';

let isDraggingCanvas = false;
let dragNode = null;
let lastMouse = { x:0, y:0 };

// ═══════════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const graphEl = document.getElementById('graph');

function resize() {
  canvas.width  = graphEl.clientWidth  * devicePixelRatio;
  canvas.height = graphEl.clientHeight * devicePixelRatio;
  canvas.style.width  = graphEl.clientWidth  + 'px';
  canvas.style.height = graphEl.clientHeight + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
resize();
window.addEventListener('resize', () => { resize(); });

function W() { return graphEl.clientWidth; }
function H() { return graphEl.clientHeight; }

// ═══════════════════════════════════════════════════════════
//  PHYSICS (simple force-directed)
// ═══════════════════════════════════════════════════════════
// Init positions in a circle
nodes.forEach((n, i) => {
  const angle = (i / nodes.length) * Math.PI * 2;
  const rad   = 280;
  n.x = W()/2 + Math.cos(angle) * rad + (Math.random()-.5)*60;
  n.y = H()/2 + Math.sin(angle) * rad + (Math.random()-.5)*60;
});

function tickPhysics() {
  const cx = W()/2, cy = H()/2;
  const alpha = 0.04;

  // Reset forces
  nodes.forEach(n => { n.fx2 = 0; n.fy2 = 0; });

  // Repulsion between all node pairs
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i+1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const minDist = (a.r + b.r) * 3.2 + 30;
      if (dist < minDist) {
        const force = (minDist - dist) / dist * 0.6;
        a.fx2 -= dx * force;
        a.fy2 -= dy * force;
        b.fx2 += dx * force;
        b.fy2 += dy * force;
      } else {
        // General repulsion
        const strength = 4000 / (dist * dist);
        a.fx2 -= dx / dist * strength;
        a.fy2 -= dy / dist * strength;
        b.fx2 += dx / dist * strength;
        b.fy2 += dy / dist * strength;
      }
    }
  }

  // Spring attraction along edges
  edges.forEach(e => {
    const a = e.source, b = e.target;
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const targetLen = (a.r + b.r) * 4.8 + 20;
    const force = (dist - targetLen) / dist * 0.12;
    a.fx2 += dx * force;
    a.fy2 += dy * force;
    b.fx2 -= dx * force;
    b.fy2 -= dy * force;
  });

  // Gravity toward center
  nodes.forEach(n => {
    const dx = cx - n.x, dy = cy - n.y;
    n.fx2 += dx * 0.012;
    n.fy2 += dy * 0.012;
  });

  // Integrate
  nodes.forEach(n => {
    if (n === dragNode) return;
    n.vx = (n.vx + n.fx2 * alpha) * 0.82;
    n.vy = (n.vy + n.fy2 * alpha) * 0.82;
    n.x += n.vx;
    n.y += n.vy;
  });
}

// ═══════════════════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════════════════
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function drawArrow(x2, y2, angle, color) {
  const len = 8, w = 4;
  ctx.save();
  ctx.translate(x2, y2);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-len, -w);
  ctx.lineTo(-len,  w);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.restore();
}

function worldToScreen(x, y) {
  return { x: x * camK + camX, y: y * camK + camY };
}
function screenToWorld(sx, sy) {
  return { x: (sx - camX) / camK, y: (sy - camY) / camK };
}

function isVisible(n) {
  return !hiddenCats.has(n.cat);
}

function draw() {
  const cw = graphEl.clientWidth, ch = graphEl.clientHeight;
  ctx.clearRect(0, 0, cw, ch);
  ctx.save();

  // Background grid (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 0.5;
  const gridSize = 40 * camK;
  const offX = camX % gridSize, offY = camY % gridSize;
  for (let x = offX; x < cw; x += gridSize) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,ch); ctx.stroke(); }
  for (let y = offY; y < ch; y += gridSize) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(cw,y); ctx.stroke(); }

  ctx.restore();

  // ── Draw edges
  edges.forEach((e, idx) => {
    if (!isVisible(e.source) || !isVisible(e.target)) return;
    if (hiddenRels.has(e.rel)) return;

    const rInfo = RELS[e.rel] || {};
    const color = rInfo.color || '#888';
    const isDimmed = highlightEdgeIdx && !highlightEdgeIdx.has(idx);
    const alpha = isDimmed ? 0.04 : 0.55;

    const sp = worldToScreen(e.source.x, e.source.y);
    const tp = worldToScreen(e.target.x, e.target.y);
    const dx = tp.x - sp.x, dy = tp.y - sp.y;
    const len = Math.sqrt(dx*dx+dy*dy) || 1;
    const sr = (e.source.r * camK) + 2;
    const tr = (e.target.r * camK) + 9;

    const x1 = sp.x + dx/len*sr, y1 = sp.y + dy/len*sr;
    const x2 = tp.x - dx/len*tr, y2 = tp.y - dy/len*tr;
    // Bezier control point
    const cx2 = (x1+x2)/2 - dy/len*14;
    const cy2 = (y1+y2)/2 + dx/len*14;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = color;
    ctx.lineWidth   = 1.4;
    if (rInfo.dash) ctx.setLineDash(rInfo.dash);
    else ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.quadraticCurveTo(cx2, cy2, x2, y2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Arrow at endpoint
    const angle = Math.atan2(y2 - cy2, x2 - cx2);
    drawArrow(x2, y2, angle, hexToRgba(color, 0.8));

    // Relation label at midpoint of bezier
    const mx = 0.25*x1 + 0.5*cx2 + 0.25*x2;
    const my = 0.25*y1 + 0.5*cy2 + 0.25*y2;

    ctx.globalAlpha = alpha * 1.3;
    ctx.font = `600 8px 'JetBrains Mono',monospace`;
    const tw = ctx.measureText(e.rel).width;
    ctx.fillStyle = '#07090f';
    ctx.fillRect(mx - tw/2 - 3, my - 7, tw + 6, 13);
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(e.rel, mx, my);

    ctx.restore();
  });

  // ── Draw nodes
  nodes.forEach(n => {
    if (!isVisible(n)) return;
    const sp = worldToScreen(n.x, n.y);
    const nr = n.r * camK;
    const color = CATS[n.cat]?.color || '#888';
    const isDimmed = highlightIds && !highlightIds.has(n.id);
    const isSelected = n.id === selectedId;
    const alpha = isDimmed ? 0.06 : 1;

    ctx.save();
    ctx.globalAlpha = alpha;

    // Glow
    const grd = ctx.createRadialGradient(sp.x, sp.y, nr*0.3, sp.x, sp.y, nr+10);
    grd.addColorStop(0, hexToRgba(color, isSelected ? 0.25 : 0.08));
    grd.addColorStop(1, hexToRgba(color, 0));
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, nr+10, 0, Math.PI*2);
    ctx.fillStyle = grd;
    ctx.fill();

    // Selected ring
    if (isSelected) {
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, nr+4, 0, Math.PI*2);
      ctx.strokeStyle = hexToRgba(color, 0.55);
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Body fill
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, nr, 0, Math.PI*2);
    ctx.fillStyle = hexToRgba(color, isSelected ? 0.22 : 0.12);
    ctx.fill();
    // Body stroke
    ctx.strokeStyle = hexToRgba(color, isSelected ? 1 : 0.75);
    ctx.lineWidth = isSelected ? 2.2 : 1.6;
    ctx.stroke();

    // Label
    const fontSize = Math.max(8.5, Math.min(12, nr * 0.6));
    ctx.fillStyle = '#eef2ff';
    ctx.font = `700 ${fontSize}px 'Noto Sans KR',sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(n.label, sp.x, sp.y - (n.sub ? nr*0.22 : 0));

    // Sub label
    if (n.sub && nr > 10) {
      ctx.fillStyle = hexToRgba('#8892bb', 0.75);
      ctx.font = `400 ${Math.max(6.5, nr*0.38)}px 'JetBrains Mono',monospace`;
      ctx.fillText(n.sub, sp.x, sp.y + nr*0.3);
    }

    ctx.restore();
  });
}

// ═══════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════════════════
let frame = 0;
function loop() {
  if (frame < 600 || dragNode) tickPhysics();
  frame++;
  draw();
  requestAnimationFrame(loop);
}
loop();

// ═══════════════════════════════════════════════════════════
//  HIT TEST
// ═══════════════════════════════════════════════════════════
function hitTest(sx, sy) {
  const w = screenToWorld(sx, sy);
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    if (!isVisible(n)) continue;
    const dx = n.x - w.x, dy = n.y - w.y;
    if (Math.sqrt(dx*dx+dy*dy) <= n.r + 6) return n;
  }
  return null;
}

// ═══════════════════════════════════════════════════════════
//  SELECTION & PANEL
// ═══════════════════════════════════════════════════════════
function selectNode(n) {
  if (!n) { clearSelection(); return; }
  selectedId = n.id;

  // Compute connected set
  const cn = new Set([n.id]);
  const ce = new Set();
  EDGES.forEach((e, i) => {
    if (e.s === n.id || e.t === n.id) {
      cn.add(e.s); cn.add(e.t); ce.add(i);
    }
  });
  highlightIds    = cn;
  highlightEdgeIdx = ce;

  showPanel(n);
}

function clearSelection() {
  selectedId       = null;
  highlightIds     = null;
  highlightEdgeIdx = null;
  hidePanel();
}

function showPanel(n) {
  const cat = CATS[n.cat] || {};
  document.getElementById('p-cat').textContent  = cat.label || n.cat;
  document.getElementById('p-cat').style.color  = cat.color || '#fff';
  document.getElementById('p-name').textContent = n.label;
  document.getElementById('p-desc').textContent = n.desc;

  const relsEl = document.getElementById('p-rels');
  relsEl.innerHTML = '';

  EDGES.forEach(e => {
    let other = null, dir = '';
    if (e.s === n.id) { other = nodeById[e.t]; dir = '→'; }
    if (e.t === n.id) { other = nodeById[e.s]; dir = '←'; }
    if (!other) return;

    const row = document.createElement('div');
    row.className = 'p-rel';
    row.style.borderLeftColor = RELS[e.rel]?.color || '#444';
    row.title = e.desc;
    row.innerHTML = `<span class="p-rel-type">${dir} ${e.rel}</span><span>${other.label}</span>`;
    row.addEventListener('click', (ev) => {
      ev.stopPropagation();
      const target = nodes[nodeIndex[other.id]];
      if (target) selectNode(target);
    });
    relsEl.appendChild(row);
  });

  document.getElementById('panel').classList.add('show');
}

function hidePanel() {
  document.getElementById('panel').classList.remove('show');
}

document.getElementById('p-close').addEventListener('click', e => {
  e.stopPropagation();
  clearSelection();
});

// ═══════════════════════════════════════════════════════════
//  MOUSE EVENTS
// ═══════════════════════════════════════════════════════════
function getCanvasXY(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

canvas.addEventListener('mousedown', e => {
  const pos = getCanvasXY(e);
  const hit = hitTest(pos.x, pos.y);
  if (hit) {
    dragNode = hit;
    hit.vx = 0; hit.vy = 0;
    canvas.classList.add('grabbing');
  } else {
    isDraggingCanvas = true;
    canvas.classList.add('grabbing');
  }
  lastMouse = pos;
});

window.addEventListener('mousemove', e => {
  const pos = getCanvasXY(e);
  if (dragNode) {
    const w = screenToWorld(pos.x, pos.y);
    dragNode.x = w.x; dragNode.y = w.y;
    dragNode.vx = 0; dragNode.vy = 0;
  } else if (isDraggingCanvas) {
    camX += pos.x - lastMouse.x;
    camY += pos.y - lastMouse.y;
  }
  lastMouse = pos;
});

window.addEventListener('mouseup', e => {
  const pos = getCanvasXY(e);
  const moved = Math.abs(pos.x - lastMouse.x) < 4 && Math.abs(pos.y - lastMouse.y) < 4;

  if (dragNode && moved) {
    // It was a click, not a drag
    selectNode(dragNode);
  } else if (isDraggingCanvas && moved) {
    clearSelection();
  }

  if (dragNode) { dragNode.vx = 0; dragNode.vy = 0; }
  dragNode = null;
  isDraggingCanvas = false;
  canvas.classList.remove('grabbing');
});

// Track whether mouse moved significantly
let mouseDownPos = { x:0, y:0 };
canvas.addEventListener('mousedown', e => {
  const pos = getCanvasXY(e);
  mouseDownPos = pos;
});

canvas.addEventListener('click', e => {
  const pos  = getCanvasXY(e);
  const dist = Math.sqrt((pos.x-mouseDownPos.x)**2 + (pos.y-mouseDownPos.y)**2);
  if (dist > 5) return; // was a drag, not a click
  const hit = hitTest(pos.x, pos.y);
  if (hit) selectNode(hit);
  else clearSelection();
});

// Scroll zoom
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const pos    = getCanvasXY(e);
  const factor = e.deltaY < 0 ? 1.1 : 0.91;
  const newK   = Math.min(3, Math.max(0.15, camK * factor));
  // Zoom toward cursor
  camX = pos.x - (pos.x - camX) * (newK / camK);
  camY = pos.y - (pos.y - camY) * (newK / camK);
  camK = newK;
}, { passive: false });

// Touch support
let lastTouchDist = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    const pos = getCanvasXY(e);
    mouseDownPos = pos;
    lastMouse    = pos;
    const hit = hitTest(pos.x, pos.y);
    dragNode = hit || null;
    if (!hit) isDraggingCanvas = true;
  } else if (e.touches.length === 2) {
    dragNode = null; isDraggingCanvas = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx*dx+dy*dy);
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    const pos = getCanvasXY(e);
    if (dragNode) {
      const w = screenToWorld(pos.x, pos.y);
      dragNode.x = w.x; dragNode.y = w.y;
    } else if (isDraggingCanvas) {
      camX += pos.x - lastMouse.x;
      camY += pos.y - lastMouse.y;
    }
    lastMouse = pos;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (lastTouchDist) {
      const factor = dist / lastTouchDist;
      camK = Math.min(3, Math.max(0.15, camK * factor));
    }
    lastTouchDist = dist;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const pos  = getCanvasXY(e);
  const dist = Math.sqrt((pos.x-mouseDownPos.x)**2 + (pos.y-mouseDownPos.y)**2);
  if (dist < 5 && dragNode) selectNode(dragNode);
  else if (dist < 5 && !dragNode) clearSelection();
  dragNode = null; isDraggingCanvas = false; lastTouchDist = null;
}, { passive: false });

// ═══════════════════════════════════════════════════════════
//  ZOOM CONTROLS
// ═══════════════════════════════════════════════════════════
document.getElementById('btn-zi').addEventListener('click', () => {
  const cx = W()/2, cy = H()/2;
  const newK = Math.min(3, camK * 1.25);
  camX = cx - (cx - camX) * (newK / camK);
  camY = cy - (cy - camY) * (newK / camK);
  camK = newK;
});
document.getElementById('btn-zo').addEventListener('click', () => {
  const cx = W()/2, cy = H()/2;
  const newK = Math.max(0.15, camK * 0.8);
  camX = cx - (cx - camX) * (newK / camK);
  camY = cy - (cy - camY) * (newK / camK);
  camK = newK;
});
document.getElementById('btn-zr').addEventListener('click', () => {
  camX = 0; camY = 0; camK = 0.82;
});

// ═══════════════════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════════════════
document.getElementById('search').addEventListener('input', function() {
  searchQ = this.value.trim().toLowerCase();
  if (!searchQ) { highlightIds = null; highlightEdgeIdx = null; selectedId = null; return; }
  const match = nodes.find(n => n.label.toLowerCase().includes(searchQ) || n.sub.toLowerCase().includes(searchQ));
  if (match) selectNode(match);
});

// ═══════════════════════════════════════════════════════════
//  LEGEND BUTTONS
// ═══════════════════════════════════════════════════════════
const catLeg = document.getElementById('cat-legend');
Object.entries(CATS).forEach(([k, v]) => {
  const btn = document.createElement('button');
  btn.className = 'leg-btn on';
  btn.innerHTML = `<span class="leg-dot" style="background:${v.color}"></span>${v.label}`;
  btn.style.color = v.color;
  btn.addEventListener('click', () => {
    if (hiddenCats.has(k)) { hiddenCats.delete(k); btn.classList.add('on'); btn.style.color = v.color; }
    else { hiddenCats.add(k); btn.classList.remove('on'); btn.style.color = '#4a5580'; }
  });
  catLeg.appendChild(btn);
});

const relLeg = document.getElementById('rel-legend');
Object.entries(RELS).forEach(([k, v]) => {
  const btn = document.createElement('button');
  btn.className = 'leg-btn on';
  const dashStyle = v.dash
    ? `background:repeating-linear-gradient(90deg,${v.color} 0,${v.color} 5px,transparent 5px,transparent 8px)`
    : `background:${v.color}`;
  btn.innerHTML = `<span class="leg-line" style="${dashStyle}"></span>${k}`;
  btn.style.color = v.color;
  btn.addEventListener('click', () => {
    if (hiddenRels.has(k)) { hiddenRels.delete(k); btn.classList.add('on'); btn.style.color = v.color; }
    else { hiddenRels.add(k); btn.classList.remove('on'); btn.style.color = '#4a5580'; }
  });
  relLeg.appendChild(btn);
});

// Panel close on outside click (but not if clicking canvas nodes)
document.getElementById('panel').addEventListener('click', e => e.stopPropagation());
</script>
